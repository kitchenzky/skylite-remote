<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Kitchenzky Sky Remote</title>
<meta name="description" content="Direct Bluetooth control for BlissLights Sky Lite 2.0 -- no app required.">
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=National+Park:wght@400;700&amp;display=swap" rel="stylesheet">
<meta name="theme-color" content="#07080f">
<!-- iOS home-screen / PWA-like launch (Bluefy: open URL, Add to Home Screen) -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Kitchenzky Sky Remote">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<style>
  :root{
    /* Deep-space navy + a single warm "starlight" accent -- a palette
       actually tied to what this controls (a star/nebula projector),
       instead of the reflexive purple/cyan gradient pairing. */
    --bg:#060810; --panel:#12141f; --panel2:#1a1d2c;
    --text:#eef0f6; --muted:#7d8296; --hair:#22263a;
    --accent:#AC8FFA; --accent-ink:#241a05;
    --ok:#5fd08a; --err:#ff8a93;
    /* strong custom easings -- built-in CSS eases feel weak/sluggish */
    --ease-out:cubic-bezier(.23,1,.32,1);
    --ease-in-out:cubic-bezier(.77,0,.175,1);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; width:100%; min-height:100%; overflow-x:hidden; color:var(--text);
    background-color:#060810; font-family:'National Park',-apple-system,BlinkMacSystemFont,"SF Pro Text",system-ui,sans-serif;}
  html{background-color:#060810;}
  body{
    padding:max(20px,env(safe-area-inset-top)) 18px 44px; min-height:100vh; max-width:520px; margin:0 auto;
    background-color:#060810; position:relative;
  }
  body.diagnostics-open{overflow:hidden;}
  .app-header{display:flex; align-items:flex-start; justify-content:space-between; gap:14px;}
  .app-title{min-width:0;}
  h1{font-size:26px; font-weight:700; margin:4px 0 2px; letter-spacing:-.02em;}
  .sub{color:var(--muted); font-size:14px; margin-bottom:22px;}
  button{font-family:inherit; cursor:pointer; border:none; color:var(--text);
    transition:transform .14s var(--ease-out), filter .14s var(--ease-out), opacity .14s var(--ease-out);}
  button:active{transform:scale(.97); filter:brightness(.92);}
  button:disabled{cursor:default;}
  .connect{width:62px; height:62px; padding:0; font-size:0; font-weight:700; border-radius:999px;
    background:var(--accent); color:var(--accent-ink); margin:0 auto 10px; display:block;
    align-items:center; justify-content:center; transition:transform .16s ease, opacity .16s ease;}
  .connect:hover{opacity:.95; transform:scale(1.03);}
  .connect svg{width:28px; height:28px; fill:currentColor;}
  .status{font-size:13px; color:var(--muted); text-align:center; min-height:18px; margin-bottom:20px;}
  .status.on{color:var(--accent);}
  .status.err{color:var(--err);}
  .diagnostics-button,.diagnostics-back{width:44px; height:44px; flex:0 0 44px; padding:0; border-radius:50%;
    display:inline-flex; align-items:center; justify-content:center; background:var(--panel); color:var(--accent);
    border:1px solid var(--hair);}
  .diagnostics-button{margin-top:1px; color:var(--muted);}
  .diagnostics-button svg,.diagnostics-back svg,.diagnostics-copy svg,.diagnostics-clear svg{width:19px; height:19px; fill:none;
    stroke:currentColor; stroke-width:2; stroke-linecap:round; stroke-linejoin:round;}
  .card{width:100%; min-width:0; background:var(--panel); border:1px solid var(--hair); border-radius:16px; padding:18px; margin-bottom:12px;}
  .card h2{font-size:12px; font-weight:650; color:var(--muted); text-transform:uppercase;
    letter-spacing:.08em; margin:0 0 14px;}
  .card h3{font-size:14px; font-weight:700; margin:0 0 10px; color:var(--text);}
  .card h2,.card h3{display:flex; align-items:center; gap:7px;}
  .card h3.section-label{font-size:12px; font-weight:650; color:var(--muted);
    text-transform:uppercase; letter-spacing:.08em;}
  .heading-icon{width:16px; height:16px; flex:0 0 16px; fill:none; stroke:currentColor;
    stroke-width:2; stroke-linecap:round; stroke-linejoin:round;}
  .card .group{margin-top:18px;}
  .tabs{display:flex; min-width:0; gap:8px; margin-bottom:0; padding-bottom:18px; border-bottom:1px solid var(--hair);}
  .tab-button{flex:1; padding:12px 14px; border-radius:12px; border:1.5px solid var(--hair);
    min-width:0; overflow:hidden; white-space:nowrap; background:var(--panel2); color:var(--text); font-weight:700; cursor:pointer; transition:background .16s ease, border-color .16s ease;
  }
  .tab-button.icon-tab{display:flex; align-items:center; justify-content:center; gap:7px;}
  .tab-button.active{background:var(--accent); border-color:var(--accent); color:var(--accent-ink);}
  .tab-panels{display:grid; min-width:0;}
  .tab-panel{grid-area:1/1; min-width:0; visibility:hidden; opacity:0; pointer-events:none;}
  .tab-panel.active{visibility:visible; opacity:1; pointer-events:auto;}
  .power{display:flex; justify-content:center; align-items:center; gap:10px;}
  .power button{flex:1; padding:18px 0; font-size:17px; font-weight:650; border-radius:12px; background:var(--panel2);}
  .power .on{background:var(--accent); color:var(--accent-ink);}
  .power .off{background:var(--panel2); color:var(--text);}
  .toggle-switch{display:inline-block;position:relative;width:100px;height:50px;--light:rgba(255,255,255,.35);--dark:var(--panel2);}
  .toggle-switch .checkbox{position:absolute;top:0;left:0;width:100%;height:100%;opacity:0;cursor:pointer;margin:0;z-index:2;}
  .toggle-switch .slider{position:absolute;top:0;left:0;width:100%;height:100%;border-radius:25px;background-color:var(--dark);border:3px solid var(--dark);transition:0.3s;z-index:1;pointer-events:none;}
  .toggle-switch .checkbox:checked + .slider{background-color:var(--light);}
  .toggle-switch .slider::before{content:"";position:absolute;top:50%;left:10px;width:25px;height:25px;border-radius:50%;box-shadow:inset 12px -4px 0px 0px var(--light);background-color:var(--dark);transform:translateY(-50%);transition:0.3s;}
  .toggle-switch .checkbox:checked + .slider::before{transform:translate(50px,-50%);box-shadow:none;}
  .grid{display:grid; min-width:0; grid-template-columns:repeat(2,minmax(0,1fr)); gap:9px;}
  .grid button{display:flex; align-items:center; justify-content:space-between; gap:8px;
    min-width:0; overflow:hidden; padding:14px 14px; border-radius:12px; background:var(--panel2); font-size:14px; font-weight:600;
    text-align:left; border:1.5px solid var(--hair);}
  .grid button>span:first-child{min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  #presets button,#colorChips button,#brightnessOptions button{border-radius:999px;}
  .grid button.active{border-color:var(--accent);}
  .grid button .check{opacity:0; color:var(--accent); font-weight:800; font-size:16px; flex-shrink:0;
    transform:scale(.8); transition:opacity .16s var(--ease-out), transform .16s var(--ease-out);}
  .grid button.active .check{opacity:1; transform:scale(1);}
  @keyframes itemIn{from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);}}
  .grid button{animation:itemIn .32s var(--ease-out) backwards;}
  .grid button:nth-child(1){animation-delay:0ms;}
  .grid button:nth-child(2){animation-delay:35ms;}
  .grid button:nth-child(3){animation-delay:70ms;}
  .grid button:nth-child(4){animation-delay:105ms;}
  .grid button:nth-child(5){animation-delay:140ms;}
  .grid button:nth-child(6){animation-delay:175ms;}
  .grid button:nth-child(7){animation-delay:210ms;}
  .grid button:nth-child(8){animation-delay:245ms;}
  .grid button:nth-child(9){animation-delay:280ms;}
  .grid button:nth-child(10){animation-delay:315ms;}
  .brightness-grid{grid-template-columns:repeat(3,minmax(0,1fr));}
  .rotation-control{display:flex; align-items:center; justify-content:center; gap:12px; min-height:42px;}
  .rotation-switch{--switch-width:56px; --switch-height:32px; --switch-knob:24px;
    --switch-offset:4px; position:relative; display:inline-flex; cursor:pointer;}
  .rotation-switch input{position:absolute; width:1px; height:1px; opacity:0; pointer-events:none;}
  .rotation-track{display:block; width:var(--switch-width); height:var(--switch-height);
    border-radius:calc(var(--switch-height) / 2); background:var(--panel2);
    box-shadow:inset 0 0 0 1.5px var(--hair); transition:background .24s var(--ease-out), box-shadow .24s var(--ease-out);}
  .rotation-track::after{content:""; position:absolute; top:var(--switch-offset); left:0;
    width:var(--switch-knob); height:var(--switch-knob); border-radius:50%; background:var(--text);
    transform:translateX(var(--switch-offset)); box-shadow:6px 0 18px rgba(0,0,0,.2);
    transition:width .18s var(--ease-out), transform .24s var(--ease-out), box-shadow .24s var(--ease-out);}
  .rotation-switch input:checked + .rotation-track{background:var(--accent); box-shadow:none;}
  .rotation-switch input:checked + .rotation-track::after{transform:translateX(calc(var(--switch-width) - var(--switch-knob) - var(--switch-offset)));
    box-shadow:-6px 0 18px rgba(0,0,0,.2);}
  .rotation-switch input:focus-visible + .rotation-track{outline:2px solid var(--accent); outline-offset:3px;}
  .rotation-switch input:active + .rotation-track::after{width:30px;}
  .rotation-switch input:checked:active + .rotation-track::after{transform:translateX(calc(var(--switch-width) - 30px - var(--switch-offset)));}
  .rotation-state{width:28px; color:var(--muted); font-size:13px; font-weight:700;
    transition:color .2s var(--ease-out);}
  .rotation-state:first-child{text-align:right;}
  .rotation-state:last-child{text-align:left;}
  .rotation-state.active{color:var(--accent);}
  .color-label{display:flex; min-width:0; align-items:center; gap:8px;}
  .color-dot{width:12px; height:12px; border-radius:50%; flex-shrink:0;}
  .color-dot.red{background:#FF2F00;}
  .color-dot.green{background:#98FA00;}
  .color-dot.blue{background:#2F55FF;}
  .seg{display:grid; grid-template-columns:repeat(3,1fr); gap:0; border:1.5px solid var(--hair);
    border-radius:12px; overflow:hidden;}
  .seg button{padding:12px 4px; background:var(--panel2); color:var(--text); font-size:14px; font-weight:600;
    border-right:1.5px solid var(--hair);}
  .seg button:last-child{border-right:none;}
  .seg button.active{background:var(--accent); color:var(--accent-ink);}
  .slider{margin-bottom:12px;}
  .slider:last-child{margin-bottom:0;}
  .slider label{display:flex; justify-content:space-between; font-size:12px; color:var(--muted); margin-bottom:5px;}
  .slider label span{color:var(--text); font-variant-numeric:tabular-nums;}
  input[type=range]{-webkit-appearance:none; width:100%; height:4px; border-radius:2px; background:var(--panel2);}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none; width:20px; height:20px; border-radius:50%;
    background:var(--accent); border:3px solid var(--bg); box-shadow:0 0 0 1px var(--hair);
    transition:transform .12s var(--ease-out);}
  input[type=range]::-webkit-slider-thumb:active{transform:scale(1.15);}
  .apply{width:100%; padding:14px; font-size:15px; font-weight:650; border-radius:12px; background:var(--accent); color:var(--accent-ink);}
  #controls{opacity:.35; pointer-events:none; transition:opacity .3s var(--ease-out);}
  #controls.ready{opacity:1; pointer-events:auto;}
  #lightSettings.unavailable{opacity:.48;}
  #lightSettings.unavailable button,#lightSettings.unavailable input{cursor:default;}
  .hint{font-size:12px; color:var(--muted); text-align:center; margin-top:14px; line-height:1.6; max-width:38ch; margin-left:auto; margin-right:auto;}
  .diagnostics-view[hidden]{display:none;}
  .diagnostics-view{position:fixed; inset:0; z-index:100; width:100%; max-width:520px; height:100vh; height:100dvh;
    margin:0 auto; padding:max(20px,env(safe-area-inset-top)) 18px 44px;
    background:var(--bg); display:flex; flex-direction:column; overflow:hidden;}
  .diagnostics-shell{width:100%; min-height:0; flex:1; margin:0 auto;
    display:flex; flex-direction:column; gap:12px;}
  .diagnostics-header{display:grid; grid-template-columns:44px minmax(0,1fr) auto; align-items:center; gap:10px;}
  .diagnostics-title{min-width:0;}
  .diagnostics-title h2{font-size:18px; line-height:1.1; margin:0 0 3px; display:flex; align-items:center; gap:8px; color:var(--text);}
  .diagnostics-title h2 svg{width:19px; height:19px; flex:0 0 19px; fill:none; stroke:currentColor;
    stroke-width:2; stroke-linecap:round; stroke-linejoin:round;}
  .diagnostics-title p{font-size:12px; color:var(--muted); margin:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .diagnostics-copy,.diagnostics-clear{width:96px; height:44px; min-height:44px; max-height:44px;
    flex:0 0 96px; padding:0 12px; border-radius:999px; display:inline-flex; align-items:center;
    justify-content:center; gap:7px; font-size:12px; font-weight:700;}
  .diagnostics-copy{background:var(--accent); color:var(--accent-ink); border:1px solid transparent;}
  .diagnostics-summary{display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:8px;}
  .diagnostics-summary>div{min-width:0; padding:10px 12px; border-radius:12px; border:1px solid var(--hair); background:var(--panel);}
  .diagnostics-summary span{display:block; margin-bottom:3px; color:var(--muted); font-size:10px; font-weight:700;
    letter-spacing:.07em; text-transform:uppercase;}
  .diagnostics-summary strong{display:block; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-size:12px;}
  .diagnostics-log{min-height:0; flex:1; margin:0; padding:14px; overflow:auto; overscroll-behavior:contain;
    border:1px solid var(--hair); border-radius:14px; background:#03050b; color:#c9cde0;
    font:12px/1.55 ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;
    white-space:pre-wrap; overflow-wrap:anywhere; user-select:text; -webkit-user-select:text;}
  .diagnostics-footer{display:flex; align-items:center; justify-content:space-between; gap:10px; min-height:44px;}
  .diagnostics-note{min-width:0; color:var(--muted); font-size:12px; line-height:1.35;}
  .diagnostics-clear{background:var(--panel); color:var(--err); border:1px solid var(--hair);}
  .diagnostics-toast{min-height:15px; color:var(--accent); font-size:11px; text-align:right;}
  @media (prefers-reduced-motion:reduce){
    .grid button{animation:none;}
    button{transition:opacity .14s var(--ease-out);}
    button:active{transform:none;}
  }
  @media (max-width:390px){
    body{padding-top:max(16px,env(safe-area-inset-top)); padding-right:max(12px,env(safe-area-inset-right));
      padding-bottom:36px; padding-left:max(12px,env(safe-area-inset-left));}
    .card{padding:14px;}
    .tabs{gap:6px; padding-bottom:14px;}
    .tab-button{padding:10px 7px; font-size:11px; gap:5px;}
    .tab-button .heading-icon{width:14px; height:14px; flex-basis:14px;}
    .grid{gap:7px;}
    .grid button{padding:12px 10px; font-size:12px; gap:6px;}
    .grid button .check{font-size:14px;}
    .color-label{gap:6px;}
    .diagnostics-view{padding-top:max(16px,env(safe-area-inset-top));
      padding-right:max(12px,env(safe-area-inset-right)); padding-bottom:36px;
      padding-left:max(12px,env(safe-area-inset-left));}
    .diagnostics-header{gap:8px;}
    .diagnostics-copy{padding:0 12px;}
  }
  @media (max-width:340px){
    .brightness-grid{grid-template-columns:repeat(2,minmax(0,1fr));}
    .brightness-grid button:last-child{grid-column:1/-1;}
  }
</style>
</head>
<body>
  <main id="mainApp">
  <div class="app-header">
    <div class="app-title">
      <h1>Kitchenzky Sky Remote</h1>
      <div class="sub">Let there be light!</div>
    </div>
    <button class="diagnostics-button" id="diagnosticsButton" type="button" aria-label="Open diagnostic logs" aria-controls="diagnosticsView" aria-expanded="false">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m8 2 1.88 1.88"/><path d="M14.12 3.88 16 2"/><path d="M9 7.13v-1a3 3 0 1 1 6 0v1"/><path d="M12 20c-3.3 0-6-2.7-6-6v-3a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v3c0 3.3-2.7 6-6 6"/><path d="M12 20v-9"/><path d="M6.53 9C4.6 8.8 3 7.1 3 5"/><path d="M6 13H2"/><path d="M3 21c0-2.1 1.7-3.9 3.8-4"/><path d="M17.47 9c1.93-.2 3.53-1.9 3.53-4"/><path d="M18 13h4"/><path d="M21 21c0-2.1-1.7-3.9-3.8-4"/></svg>
    </button>
  </div>

  <button class="connect" id="connectBtn" aria-label="Connect to light">
    <svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
      <path d="M512 981.333333c-8.533333 0-12.8 0-21.333333-4.266666-12.8-8.533333-21.333333-21.333333-21.333334-38.4v-332.8l-209.066666 174.933333c-17.066667 17.066667-46.933333 12.8-59.733334-4.266667-17.066667-17.066667-12.8-46.933333 4.266667-59.733333l238.933333-200.533333-234.666666-204.8c-17.066667-17.066667-21.333333-42.666667-4.266667-59.733334 17.066667-17.066667 42.666667-21.333333 59.733333-4.266666l204.8 170.666666V85.333333c0-17.066667 8.533333-29.866667 21.333334-38.4 12.8-8.533333 29.866667-4.266667 42.666666 4.266667L810.666667 243.2c12.8 8.533333 17.066667 21.333333 17.066666 34.133333 0 12.8-4.266667 25.6-17.066666 34.133334L576 512l238.933333 200.533333c8.533333 8.533333 17.066667 21.333333 17.066667 34.133334 0 12.8-8.533333 25.6-17.066667 34.133333l-277.333333 192c-8.533333 4.266667-17.066667 8.533333-25.6 8.533333z m42.666667-375.466666v251.733333l166.4-115.2-166.4-136.533333z m0-439.466667v251.733333l166.4-140.8L554.666667 166.4z"/>
    </svg>
  </button>
  <div class="status" id="status" role="status" aria-live="polite">Tap Connect, then pick "BlissLights".</div>

  <div id="controls">
    <div class="card">
      <h2><svg class="heading-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2v10"/><path d="M18.4 6.6a9 9 0 1 1-12.77.04"/></svg>Power</h2>
      <div class="power">
        <label class="toggle-switch">
          <input type="checkbox" id="powerToggle" class="checkbox" aria-label="Power">
          <span class="slider"></span>
        </label>
      </div>
    </div>

    <div class="card" id="lightSettings">
      <div class="tabs" role="tablist" aria-label="Light settings">
        <button class="tab-button icon-tab active" type="button" role="tab" id="presetsTabButton" data-tab="presetsTab" aria-controls="presetsTab" aria-selected="true"><svg class="heading-icon" viewBox="0 0 24 24" aria-hidden="true"><rect width="18" height="7" x="3" y="3" rx="1"/><rect width="9" height="7" x="3" y="14" rx="1"/><rect width="5" height="7" x="16" y="14" rx="1"/></svg>PRESETS</button>
        <button class="tab-button icon-tab" type="button" role="tab" id="lightControlTabButton" data-tab="lightControlTab" aria-controls="lightControlTab" aria-selected="false" tabindex="-1"><svg class="heading-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M10 5H3"/><path d="M12 19H3"/><path d="M14 3v4"/><path d="M16 17v4"/><path d="M21 12h-9"/><path d="M21 19h-5"/><path d="M21 5h-7"/><path d="M8 10v4"/><path d="M8 12H3"/></svg>LIGHT CONTROL</button>
      </div>
      <div class="tab-panels">
      <div class="tab-panel active" id="presetsTab" role="tabpanel" aria-labelledby="presetsTabButton">
        <div class="group">
          <h3 class="section-label"><svg class="heading-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M11.525 2.295a.53.53 0 0 1 .95 0l2.31 4.679a2.123 2.123 0 0 0 1.595 1.16l5.166.756a.53.53 0 0 1 .294.904l-3.736 3.638a2.123 2.123 0 0 0-.611 1.878l.882 5.14a.53.53 0 0 1-.771.56l-4.618-2.428a2.122 2.122 0 0 0-1.973 0L6.396 21.01a.53.53 0 0 1-.77-.56l.881-5.139a2.122 2.122 0 0 0-.611-1.879L2.16 9.795a.53.53 0 0 1 .294-.906l5.165-.755a2.122 2.122 0 0 0 1.597-1.16z"/></svg>Preset list</h3>
          <div class="grid" id="presets"></div>
        </div>
      </div>
      <div class="tab-panel" id="lightControlTab" role="tabpanel" aria-labelledby="lightControlTabButton" aria-hidden="true">
        <div class="group">
          <h3 class="section-label"><svg class="heading-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 22a1 1 0 0 1 0-20 10 9 0 0 1 10 9 5 5 0 0 1-5 5h-2.25a1.75 1.75 0 0 0-1.4 2.8l.3.4a1.75 1.75 0 0 1-1.4 2.8z"/><circle cx="13.5" cy="6.5" r=".5" fill="currentColor"/><circle cx="17.5" cy="10.5" r=".5" fill="currentColor"/><circle cx="6.5" cy="12.5" r=".5" fill="currentColor"/><circle cx="8.5" cy="7.5" r=".5" fill="currentColor"/></svg>Colors</h3>

"use strict";
/* ============================ AES-128 (pure JS) ============================ */
const SBOX = (() => {
  const exp=new Uint8Array(256), log=new Uint8Array(256), s=new Uint8Array(256);
  let x=1;
  for(let i=0;i<255;i++){exp[i]=x; log[x]=i; x^=(x<<1)^((x&0x80)?0x11b:0); x&=0xff;}
  const inv=a=>a===0?0:exp[(255-log[a])%255];
  for(let i=0;i<256;i++){let b=inv(i),r=b; for(let k=0;k<4;k++){r=((r<<1)|(r>>7))&0xff; b^=r;} s[i]=(b^0x63)&0xff;}
  return s;
})();
const RCON=[0x01,0x02,0x04,0x08,0x10,0x20,0x40,0x80,0x1b,0x36];
function mul(a,b){let r=0;for(let i=0;i<8;i++){if(b&1)r^=a;const hi=a&0x80;a=(a<<1)&0xff;if(hi)a^=0x1b;b>>=1;}return r;}
function keyExpansion(key){
  const w=new Uint8Array(176); w.set(key.subarray(0,16),0);
  for(let i=16;i<176;i+=4){
    let t0=w[i-4],t1=w[i-3],t2=w[i-2],t3=w[i-1];
    if(i%16===0){[t0,t1,t2,t3]=[t1,t2,t3,t0];t0=SBOX[t0];t1=SBOX[t1];t2=SBOX[t2];t3=SBOX[t3];t0^=RCON[(i/16)-1];}
    w[i]=w[i-16]^t0; w[i+1]=w[i-15]^t1; w[i+2]=w[i-14]^t2; w[i+3]=w[i-13]^t3;
  }
  return w;
}
function encryptBlock(key,input){
  const w=keyExpansion(key); let s=new Uint8Array(input.subarray(0,16));
  for(let i=0;i<16;i++)s[i]^=w[i];
  for(let round=1;round<=10;round++){
    for(let i=0;i<16;i++)s[i]=SBOX[s[i]];
    let t=new Uint8Array(16);
    for(let r=0;r<4;r++)for(let c=0;c<4;c++)t[c*4+r]=s[((c+r)%4)*4+r];
    s=t;
    if(round<10){
      const o=new Uint8Array(16);
      for(let c=0;c<4;c++){
        const a0=s[c*4],a1=s[c*4+1],a2=s[c*4+2],a3=s[c*4+3];
        o[c*4]=mul(a0,2)^mul(a1,3)^a2^a3;
        o[c*4+1]=a0^mul(a1,2)^mul(a2,3)^a3;
        o[c*4+2]=a0^a1^mul(a2,2)^mul(a3,3);
        o[c*4+3]=mul(a0,3)^a1^a2^mul(a3,2);
      }
      s=o;
    }
    for(let i=0;i<16;i++)s[i]^=w[round*16+i];
  }
  return s;
}
/* ============================ Telink helpers ============================ */
const rev=a=>{const b=new Uint8Array(a.length);for(let i=0;i<a.length;i++)b[i]=a[a.length-1-i];return b;};
const aesAtt=(k,d)=>rev(encryptBlock(rev(k),rev(d)));       // reverse-in, reverse-out
const aesNoFinal=(k,d)=>encryptBlock(rev(k),rev(d));         // reverse-in only
const pad16=b=>{const o=new Uint8Array(16);o.set(b.subarray(0,16));return o;};
const enc=s=>new TextEncoder().encode(s);
const sleep=ms=>new Promise(r=>setTimeout(r,ms));
function withTimeout(promise,timeoutMs,stage){
  if(!timeoutMs) return Promise.resolve(promise);
  return new Promise((resolve,reject)=>{
    let settled=false;
    const timer=setTimeout(()=>{
      if(settled) return;
      settled=true;
      const error=new Error(stage+" timed out after "+timeoutMs+" ms.");
      error.name="TimeoutError";
      error.bluetoothStage=stage;
      error.timeoutMs=timeoutMs;
      reject(error);
    },timeoutMs);
    Promise.resolve(promise).then(value=>{
      if(settled) return;
      settled=true;
      clearTimeout(timer);
      resolve(value);
    },error=>{
      if(settled) return;
      settled=true;
      clearTimeout(timer);
      reject(error);
    });
  });
}

/* ============================ Persistent diagnostics ============================ */
const APP_BUILD="2026-07-21-diagnostics-14";

let diagnosticPersistenceState="persistent";
let diagnosticPersistenceError="";
let diagnosticStorageReady=false;
function diagnosticSafeText(value,maxLength=500){

    .replace(/[\u0000-\u001f\u007f-\u009f]/g," ")
    .replace(/\b[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}\b/gi,"[identifier]")

}
function noteDiagnosticPersistenceFailure(error,state="memory only"){

try{

}catch(e){ noteDiagnosticPersistenceFailure(e); }

  if(diagnosticPersistenceState==="memory only") return [];

  }
}
let diagnosticEntries=loadDiagnosticEntries();
diagnosticStorageReady=true;
function diagnosticHex(bytes){

}
const diagnosticDeviceAliases=new Map();
const diagnosticAnonymousDeviceAliases=new WeakMap();
let diagnosticDeviceAliasCounter=0;
function diagnosticDeviceAlias(device){
  const id=String(device?.id||"");
  if(id){
    if(!diagnosticDeviceAliases.has(id)) diagnosticDeviceAliases.set(id,"projector #"+(++diagnosticDeviceAliasCounter));
    return diagnosticDeviceAliases.get(id);
  }
  if(device&&typeof device==="object"){
    if(!diagnosticAnonymousDeviceAliases.has(device)) diagnosticAnonymousDeviceAliases.set(device,"projector #"+(++diagnosticDeviceAliasCounter));
    return diagnosticAnonymousDeviceAliases.get(device);
  }
  return "projector (unknown)";
}
function diagnosticDeviceRef(device){
  const name=diagnosticSafeText(device?.name||"Unnamed device",32)||"Unnamed device";
  const type=/blisslights/i.test(name)?"BlissLights":"Bluetooth device";
  return type+" ("+diagnosticDeviceAlias(device)+")";
}
function diagnosticDetails(value){
  if(value===undefined) return "";
  if(value instanceof Error) return diagnosticSafeText(value.name+": "+value.message,1000);
  if(value instanceof Uint8Array) return "[byte array omitted; length "+value.length+"]";
  if(typeof value==="string") return diagnosticSafeText(value,2000);
  try{
    const serialized=JSON.stringify(value,(key,item)=>{
      if(/device.?id/i.test(key)&&typeof item==="boolean") return item;
      if(/password|secret|session.?key|key.?value|nonce|challenge|hardware.?mac|real.?mac|mesh.?pw|combined|mac.?rev|token|credential|device.?id|pair.?packet/i.test(key)) return "[redacted]";
      if(item instanceof Uint8Array) return "[byte array omitted; length "+item.length+"]";
      if(item instanceof Error) return {name:diagnosticSafeText(item.name,80),message:diagnosticSafeText(item.message,600)};
      return item;
    });

function trimDiagnosticEntries(){
  let total=diagnosticEntries.reduce((sum,line)=>sum+line.length,0);
  while(diagnosticEntries.length>DIAGNOSTIC_MAX_ENTRIES||total>DIAGNOSTIC_MAX_CHARS){
    const removed=diagnosticEntries.shift();

  }

function persistDiagnosticEntries(){
  trimDiagnosticEntries();

  try{ localStorage.setItem(DIAGNOSTIC_STORAGE_KEY,JSON.stringify(diagnosticEntries)); }
  catch(e){
    diagnosticEntries=diagnosticEntries.slice(-100);

    try{

    }catch(fallbackError){ noteDiagnosticPersistenceFailure(fallbackError); }

let diagnosticPersistTimer=null;
function scheduleDiagnosticPersistence(immediate=false){

    persistDiagnosticEntries();
    return;
  }

    diagnosticPersistTimer=null;
    persistDiagnosticEntries();
  },120);

let diagnosticRenderTimer=null;
function scheduleDiagnosticRender(immediate=false){

  if(immediate){
    if(diagnosticRenderTimer!==null){ clearTimeout(diagnosticRenderTimer); diagnosticRenderTimer=null; }
    renderDiagnosticEntries();
    return;
  }
  if(diagnosticRenderTimer!==null) return;

    diagnosticRenderTimer=null;
    renderDiagnosticEntries();
  },80);

function renderDiagnosticEntries(forceBottom=false){
  const output=document.getElementById("diagnosticsLog");
  const count=document.getElementById("diagnosticsCount");
  const view=document.getElementById("diagnosticsView");
  if(count) count.textContent=diagnosticEntries.length+" saved event"+(diagnosticEntries.length===1?"":"s")+" · "+diagnosticPersistenceState;
  if(!forceBottom&&view?.hidden) return;
  if(!output) return;
  const nearBottom=output.scrollHeight-output.scrollTop-output.clientHeight<70;
  output.textContent=diagnosticEntries.length ? diagnosticEntries.join("\n") : "No diagnostic events yet.";
  if(forceBottom||nearBottom) output.scrollTop=output.scrollHeight;

function diagnosticLog(category,event,details,level="INFO"){
  const elapsed=((performance.now()-diagnosticSessionStartedAt)/1000).toFixed(3).padStart(8," ");

  // The final APP session event still flushes the complete in-memory history.

function diagnosticError(category,event,error,extra){

}
function markDiagnosticSessionActive(){
  if(diagnosticPersistenceState==="memory only") return;
  try{ localStorage.setItem(DIAGNOSTIC_ACTIVE_KEY,JSON.stringify({id:diagnosticSessionId,startedAt:new Date().toISOString()})); }
  catch(e){ noteDiagnosticPersistenceFailure(e); }
}
function endDiagnosticSession(reason){
  if(diagnosticSessionEnded) return;
  diagnosticSessionEnded=true;
  diagnosticLog("APP","SESSION_END",{reason});
  try{ localStorage.removeItem(DIAGNOSTIC_ACTIVE_KEY); }catch(e){ noteDiagnosticPersistenceFailure(e); }
}
let previousDiagnosticSession=null;
try{ previousDiagnosticSession=JSON.parse(localStorage.getItem(DIAGNOSTIC_ACTIVE_KEY)||"null"); }catch(e){ noteDiagnosticPersistenceFailure(e); }
markDiagnosticSessionActive();
diagnosticLog("APP","SESSION_START",{
  build:APP_BUILD,

  screenDimApi:typeof navigator.bluetooth?.setScreenDimEnabled==="function",

function describeMeshCommand(cmd,data){

  if(sub===SUB_ONOFF&&data[2]===0) return {name:"scene.load",sceneId:data[1]};

    this.commandChain=Promise.resolve();
    this.commandQueueDepth=0;
    this.appliedState={power:null,mode:null,presetId:null,manual:null};
    this.restoredOutputPlan=null;
  }
  async _connectAwait(promise,stage){
    const awaitEpoch=this.sessionEpoch;
    try{
      const value=await withTimeout(promise,connectStageTimeout(stage),stage);
      if(this.sessionEpoch!==awaitEpoch){
        const error=new Error("Bluetooth session changed during "+stage+".");
        error.name="NetworkError";
        throw error;
      }
      this._throwIfConnectCancelled(stage);
      return value;
    }catch(error){
      try{
        if(error&&typeof error==="object"&&!error.telinkConnectStage) error.telinkConnectStage=stage;
      }catch(ignored){}
      throw error;
    }
  }
  isSessionCurrent(epoch){
    return epoch===this.sessionEpoch && !this.connectCancelled &&
      !!this.sessionKey && !!this.device?.gatt?.connected;
  }
  _throwIfConnectCancelled(stage){
    if(!this.connectCancelled) return;
    const reason=this.connectCancelReason||"app left the foreground";
    diagnosticLog("BT","LATE_CONNECT_STOPPED",{stage,reason,gattConnected:!!this.device?.gatt?.connected},"WARN");
    this._clearConnection(true,"cancelled during "+stage);
    const error=new Error("Connection stopped because the app left the foreground.");
    error.name="AbortError";
    throw error;
  }
  async connect(device,{assertPower=true,connectionReason="explicit Connect"}={}){
    const connectStarted=performance.now();
    let stage="listener setup";
    this.connectCancelled=false;
    this.connectCancelReason="";
    this.lastConnectFailureStage=null;
    this.device=device;
    diagnosticLog("BT","CONNECT_START",{device:diagnosticDeviceRef(device),alreadyConnected:!!device?.gatt?.connected,assertPower,connectionReason});
    this.disconnectHandler=()=>{
      diagnosticLog("BT","GATT_DISCONNECTED",{expected:false,hadSession:!!this.sessionKey,activePresetId},"WARN");
      this._clearConnection(false,"gattserverdisconnected event");
      if(mesh!==this) return;
      connectionReady=false;
      stopPresetEffect();
      setStatus("error","Unexpected GATT disconnect");
      updateControlAvailability();
    };
    this.device.addEventListener('gattserverdisconnected',this.disconnectHandler);
    try{
      stage="gatt connect";
      diagnosticLog("BT","GATT_CONNECT_START");
      const connectEpoch=this.sessionEpoch;
      const deviceOwnerKey=bluetoothDeviceOwnerKey(this.device);
      bluetoothDeviceOwners.set(deviceOwnerKey,this);
      const nativeConnect=this.device.gatt.connect();
      nativeConnect.then(()=>{
        if(this.sessionEpoch===connectEpoch&&bluetoothDeviceOwners.get(deviceOwnerKey)===this) return;
        // A timed-out native connect can finish long after JavaScript gave up.
        // Release it only when no newer mesh owns the same BluetoothDevice.
        if(!bluetoothDeviceOwners.has(deviceOwnerKey)&&this.device?.gatt?.connected){
          try{ this.device.gatt.disconnect(); }
          catch(error){ diagnosticError("BT","LATE_GATT_RELEASE_FAILED",error); }
          diagnosticLog("BT","LATE_GATT_RELEASED",{reason:"stale native connect completion"},"WARN");
        }
      }).catch(()=>{});
      const server=await this._connectAwait(nativeConnect,"gatt connect");
      diagnosticLog("BT","GATT_CONNECT_OK",{connected:!!this.device.gatt.connected});
      stage="service discovery";
      const svc=await this._connectAwait(server.getPrimaryService(SERVICE),"service discovery");
      diagnosticLog("BT","SERVICE_READY",{service:"telink mesh"});
      stage="characteristic discovery";
      this.pairCh=await this._connectAwait(svc.getCharacteristic(CH_PAIR),"pair characteristic discovery");
      this.cmdCh=await this._connectAwait(svc.getCharacteristic(CH_COMMAND),"command characteristic discovery");
      this.notifyCh=await this._connectAwait(svc.getCharacteristic(CH_NOTIFY),"notification characteristic discovery");
      diagnosticLog("BT","CHARACTERISTICS_READY",{pair:true,command:true,notify:true});

      // --- mesh login handshake ---
      stage="Telink login";
      diagnosticLog("PAIR","LOGIN_START");
      const our=new Uint8Array(8); crypto.getRandomValues(our);
      const km=new Uint8Array(16); km.set(our);
      const v20=aesNoFinal(km,this.combined);
      const encTail=rev(v20.subarray(8,16));
      const pairPkt=new Uint8Array(17); pairPkt[0]=0x0C; pairPkt.set(our,1); pairPkt.set(encTail,9);
      await this._connectAwait(this.pairCh.writeValue(pairPkt),"login request write");
      diagnosticLog("PAIR","LOGIN_REQUEST_WRITTEN",{length:pairPkt.length});
      await this._connectAwait(sleep(300),"login response wait");
      const resp=new Uint8Array((await this._connectAwait(this.pairCh.readValue(),"login response read")).buffer);
      const pairStatus=resp.length?"0x"+resp[0].toString(16).padStart(2,"0"):"missing";
      diagnosticLog("PAIR","LOGIN_RESPONSE",{length:resp.length,status:pairStatus,accepted:resp[0]===0x0D&&resp.length>=9});
      if(resp[0]!==0x0D){
        if(!resp.length) diagnosticLog("PAIR","LOGIN_RESPONSE_MALFORMED",{length:0,reason:"missing status byte"},"ERROR");
        throw new Error(resp.length
          ? "Light rejected pairing ("+pairStatus+"). Close the BlissLights app on all phones, then retry."
          : "Light returned an empty pairing response. Reconnect the projector and retry.");
      }
      if(resp.length<9){
        diagnosticLog("PAIR","LOGIN_RESPONSE_MALFORMED",{length:resp.length,status:pairStatus,requiredLength:9},"ERROR");
        throw new Error("Light returned an incomplete pairing response. Reconnect the projector and retry.");
      }
      const dev=resp.subarray(1,9);
      const cat=new Uint8Array(16); cat.set(our); cat.set(dev,8);
      this.sessionKey=aesAtt(this.combined,cat);
      diagnosticLog("PAIR","LOGIN_ACCEPTED",{authReady:true});

      // --- enable status notifications (to learn the mesh address) ---
      stage="notification setup";
      await this._connectAwait(this.notifyCh.startNotifications(),"notification start");
      this.notifyHandler=e=>this._onNotify(new Uint8Array(e.target.value.buffer));
      this.notifyCh.addEventListener('characteristicvaluechanged',this.notifyHandler);
      await this._connectAwait(this.notifyCh.writeValue(Uint8Array.of(0x01)),"notification enable write");
      diagnosticLog("BT","NOTIFICATIONS_READY");
      try{
        const initial = await this._connectAwait(this.notifyCh.readValue(),"initial notification read");
        diagnosticLog("RX","INITIAL_NOTIFY_READ",{length:initial.byteLength});
        this._onNotify(new Uint8Array(initial.buffer));
      }catch(e){
        if(e.name==="AbortError"||e.name==="TimeoutError") throw e;
        if(this.connectCancelled) this._throwIfConnectCancelled("initial notification read");
        diagnosticError("RX","INITIAL_NOTIFY_READ_FAILED",e);
      }
      stage="status synchronization";
      await this._connectAwait(sleep(100),"status synchronization delay");
      await this._connectAwait(this._waitForDst(700),"destination synchronization");
      if(this.dst===0xFFFF){
        diagnosticLog("STATE","STATUS_QUERY_NEEDED",{reason:"destination still unknown"});
        await this._connectAwait(this.queryStatus(),"status query");
        await this._connectAwait(sleep(250),"status response wait");
        await this._connectAwait(this._readStatusNotification(),"status notification read");
        await this._connectAwait(this._waitForDst(500),"destination synchronization after query");
      }else{
        diagnosticLog("STATE","STATUS_QUERY_SKIPPED",{reason:"destination already learned"});
      }
      if(!this.sessionKey||!this.device?.gatt?.connected){
        throw new Error("Connection was interrupted. Tap Connect to retry.");
      }
      const restorePlan=captureDesiredOutputPlan();
      if(assertPower){
        // Preload before an explicit physical wake to hide the firmware's
        // brief default-color frame, then restore once more after power-on.
        stage="output preload";
        await this._connectAwait(tryPreloadDesiredOutput(this,restorePlan,"successful Connect"),"connect output preload");
        await this._connectAwait(sleep(CONNECT_PRELOAD_SETTLE_MS),"connect preload settle");
        diagnosticLog("STATE","CONNECT_POWER_ON_START",{previous:powerOn?"ON":"OFF",passiveStateKnown:this.powerStateKnown});
        stage="power synchronization";
        await this._connectAwait(this.setPower(true),"connect power-on synchronization");
        this._setCommandedPowerState(true,"successful Connect");
      }else{
        diagnosticLog("STATE","CONNECT_POWER_ON_SKIPPED",{
          reason:connectionReason,
          expectedPower:powerOn?"ON":"OFF",
          purpose:"resume the existing powered session without a wake blink"
        });
      }
      stage="output restoration";
      const outputRestoreReason=assertPower?"post-power restore":connectionReason+" output restore";
      diagnosticLog("STATE","CONNECT_OUTPUT_RESTORE_START",Object.assign({assertPower,reason:outputRestoreReason},describeDesiredOutputPlan(restorePlan)));
      await this._connectAwait(writeDesiredOutput(this,restorePlan,outputRestoreReason),"connect output restoration");
      markAppliedOutput(this,restorePlan,connectionReason+" restore");
      this.restoredOutputPlan=restorePlan;
      diagnosticLog("STATE","CONNECT_OUTPUT_RESTORE_DONE",describeDesiredOutputPlan(restorePlan));
      this.statusSyncActive=false;
      diagnosticLog("BT","CONNECT_READY",{
        durationMs:Math.round(performance.now()-connectStarted),
        destination:this.dst===0xFFFF?"unknown":"0x"+this.dst.toString(16).padStart(4,"0"),
        powerStateKnown:this.powerStateKnown,
        powerSource:this.powerStateSource,
        power:powerOn?"ON":"OFF",
        mode:activeMode,
        presetId:activePresetId,
        presetSource:this.presetStateSource
      });
    }catch(e){
      const failureStage=e?.telinkConnectStage||stage;
      this.lastConnectFailureStage=failureStage;
      try{ if(e&&typeof e==="object"&&!e.telinkConnectStage) e.telinkConnectStage=failureStage; }catch(ignored){}
      if(e.name==="AbortError"||this.connectCancelled) diagnosticLog("BT","CONNECT_CANCELLED",{stage:failureStage,reason:this.connectCancelReason||e.message,durationMs:Math.round(performance.now()-connectStarted)},"WARN");
      else diagnosticError("BT","CONNECT_FAILED",e,{stage:failureStage,durationMs:Math.round(performance.now()-connectStarted)});
      if(this.disconnectHandler||this.notifyHandler||this.sessionKey||this.device?.gatt?.connected||bluetoothDeviceOwners.get(bluetoothDeviceOwnerKey(this.device))===this) this.disconnect("connect failure: "+failureStage);
      throw e;
    }
  }
  _clearConnection(disconnect,reason="cleanup"){
    const before={reason,intentional:disconnect,hadSession:!!this.sessionKey,gattConnected:!!this.device?.gatt?.connected,powerStateKnown:this.powerStateKnown};
    this.sessionEpoch++;
    const deviceOwnerKey=bluetoothDeviceOwnerKey(this.device);
    const ownsDevice=bluetoothDeviceOwners.get(deviceOwnerKey)===this;
    try{
      if(this.device&&this.disconnectHandler) this.device.removeEventListener('gattserverdisconnected',this.disconnectHandler);
    }catch(e){ diagnosticError("BT","DISCONNECT_LISTENER_REMOVE_FAILED",e,{reason}); }
    this.disconnectHandler=null;
    if(disconnect&&ownsDevice){
      try{ if(this.device?.gatt?.connected) this.device.gatt.disconnect(); }
      catch(e){ diagnosticError("BT","GATT_DISCONNECT_FAILED",e,{reason}); }
    }
    if(ownsDevice) bluetoothDeviceOwners.delete(deviceOwnerKey);
    try{
      if(this.notifyCh&&this.notifyHandler) this.notifyCh.removeEventListener('characteristicvaluechanged',this.notifyHandler);
    }catch(e){ diagnosticError("BT","NOTIFY_LISTENER_REMOVE_FAILED",e,{reason}); }
    this.notifyHandler=null;
    this.sessionKey=null;
    this.powerStateKnown=false;
    this.powerStateSource="unconfirmed";
    this.presetStateSource="unconfirmed";
    this.statusSyncActive=false;
    this.pairCh=null; this.cmdCh=null; this.notifyCh=null;
    diagnosticLog("BT","CONNECTION_CLEARED",before);
  }
  disconnect(reason="app requested"){
    this.connectCancelled=true;
    this.connectCancelReason=reason;
    diagnosticLog("BT","DISCONNECT_REQUEST",{reason,gattConnected:!!this.device?.gatt?.connected,hadSession:!!this.sessionKey});
    this._clearConnection(true,reason);
  }
  async _waitForDst(timeout=2000){
    if(this.dst!==0xFFFF){
      diagnosticLog("STATE","DESTINATION_ALREADY_KNOWN",{destination:"0x"+this.dst.toString(16).padStart(4,"0")});
      return;
    }
    const start=Date.now();
    while(this.dst===0xFFFF && Date.now()-start<timeout){
      await sleep(50);
    }
    diagnosticLog("STATE",this.dst===0xFFFF?"DESTINATION_TIMEOUT":"DESTINATION_LEARNED",{
      waitedMs:Date.now()-start,
      destination:this.dst===0xFFFF?"unknown":"0x"+this.dst.toString(16).padStart(4,"0")
    },this.dst===0xFFFF?"WARN":"INFO");
  }
  async _readStatusNotification(){
    try{
      const value = await this.notifyCh.readValue();
      diagnosticLog("RX","STATUS_READ",{length:value.byteLength});
      this._onNotify(new Uint8Array(value.buffer));
    }catch(e){ diagnosticError("RX","STATUS_READ_FAILED",e); }
  }
  // Telink status queries carry the standard 0x10 selector. Sending an
  // empty 0xDA request makes this projector answer with an empty 0xDB packet.
  queryStatus(){ return this._send(0xDA, Uint8Array.of(0x10)); }
  _setReportedPowerState(state){
    if(state===null || mesh!==this){
      diagnosticLog("STATE","REPORTED_POWER_IGNORED",{state,reason:mesh!==this?"stale mesh":"unknown state"},"WARN");
      return;
    }
    const previous=powerOn;
    if(!state) stopPresetEffect();
    this.powerStateKnown=true;
    this.powerStateSource="device-reported";
    powerOn=state;
    this.appliedState.power=state;
    savePowerState();
    syncPowerToggle();
    updateControlAvailability();
    diagnosticLog("STATE","POWER_REPORTED",{previous:previous?"ON":"OFF",reported:state?"ON":"OFF",source:"device notification"});
  }
  _setCommandedPowerState(state,reason){
    if(mesh!==this){
      diagnosticLog("STATE","COMMANDED_POWER_IGNORED",{state,reason:"stale mesh"},"WARN");
      return;
    }
    const previous=powerOn;
    if(!state) stopPresetEffect(reason);
    this.powerStateKnown=true;
    this.powerStateSource="app-commanded";
    powerOn=state;
    this.appliedState.power=state;
    savePowerState();
    syncPowerToggle();
    updateControlAvailability();
    diagnosticLog("STATE","POWER_COMMANDED",{previous:previous?"ON":"OFF",commanded:state?"ON":"OFF",reason});
  }
  _onNotify(pkt){
    if(!this.sessionKey||pkt.length<16){
      diagnosticLog("RX","NOTIFY_IGNORED",{length:pkt.length,reason:!this.sessionKey?"no session":"short packet"},"WARN");
      return;
    }
    const ns=new Uint8Array(8); ns.set(this.macRev.subarray(0,3),0); ns.set(pkt.subarray(0,5),3);
    const blk=new Uint8Array(16); blk.set(ns,1);
    const stream=aesAtt(this.sessionKey,blk);
    const dec=new Uint8Array(pkt); for(let i=0;i<pkt.length-7;i++) dec[i+7]^=stream[i&15];
    const op=dec[7], payload=dec[10];
    if(this===mesh&&activeAnimatedPresetId!==null&&dec.length>=17&&op===0xEA&&dec[10]===SUB_CONTROL){
      const receivedAt=Date.now();
      const wasStalled=this.animationFeedbackStalled;
      const stalledFor=wasStalled&&this.animationFeedbackStalledSince?receivedAt-this.animationFeedbackStalledSince:0;
      const previousFeedback=this.lastAnimationFeedback;
      const nextFeedback={
        r:dec[11],g:dec[12],b:dec[13],laser:dec[14],
        rotation:dec[15],brightness:dec[16],receivedAt
      };
      const feedbackChanged=!previousFeedback||["r","g","b","laser","rotation","brightness"]
        .some(key=>previousFeedback[key]!==nextFeedback[key]);
      this.animationFeedbackCount++;
      this.lastAnimationFeedbackAt=receivedAt;
      this.lastAnimationFeedback=nextFeedback;
      if(feedbackChanged){
        this.animationFeedbackChangeCount++;
        this.animationLocalWritesAtLastFeedbackProgress=this.animationLocalWriteCount;
        this.lastAnimationFeedbackProgressAt=receivedAt;
        this.animationFeedbackStalled=false;
        this.animationFeedbackStalledSince=0;
        if(wasStalled){
          diagnosticLog("RX","ANIMATION_DEVICE_FEEDBACK_RECOVERED",{
            presetId:activeAnimatedPresetId,
            stalledForMs:stalledFor,
            feedbackCount:this.animationFeedbackCount,
            feedbackChangeCount:this.animationFeedbackChangeCount,
            state:this.lastAnimationFeedback
          });
        }
      }else{
        this.animationRepeatedFeedbackCount++;
      }
    }
    const suppressAnimationNoise=!this.statusSyncActive&&activeAnimatedPresetId!==null&&op!==SUB_ONOFF;
    if(suppressAnimationNoise){
      this.suppressedAnimationNotifications++;
      this.latestSuppressedNotification={op:"0x"+op.toString(16).padStart(2,"0"),data:diagnosticHex(dec.subarray(10)),length:pkt.length};
      if(!this.lastNotificationSummaryAt||Date.now()-this.lastNotificationSummaryAt>DIAGNOSTIC_ANIMATION_SAMPLE_MS){
        diagnosticLog("RX","ANIMATION_NOTIFICATION_SAMPLE",Object.assign({count:this.suppressedAnimationNotifications,presetId:activeAnimatedPresetId},this.latestSuppressedNotification));
        this.suppressedAnimationNotifications=0;
        this.lastNotificationSummaryAt=Date.now();
      }
    }else{
      this._flushAnimationNotificationSummary("notification mode changed");
      diagnosticLog("RX","NOTIFY",{op:"0x"+op.toString(16).padStart(2,"0"),data:diagnosticHex(dec.subarray(10)),length:pkt.length});
    }
    if(op===0xDC){
      if(payload!==0&&payload!==0xFF){
        const previous=this.dst;
        this.dst=payload;
        if(previous!==payload) diagnosticLog("STATE","DESTINATION_FROM_0xDC",{previous:previous===0xFFFF?"unknown":"0x"+previous.toString(16),destination:"0x"+payload.toString(16)});
      }
    }
    if(op===0xDB){
      const reportData=dec.subarray(10);
      if(reportData.every(value=>value===0)){
        diagnosticLog("STATE","STATUS_REPORT_EMPTY",{op:"0xdb",powerUsable:false},"WARN");
      }else{
        diagnosticLog("STATE","STATUS_REPORT_RECEIVED",{op:"0xdb",data:diagnosticHex(reportData),powerUsable:"not yet mapped"});
      }
      if(payload!==0&&payload!==0xFF){
        const previous=this.dst;
        this.dst=payload;
        if(previous!==payload) diagnosticLog("STATE","DESTINATION_FROM_0xDB",{previous:previous===0xFFFF?"unknown":"0x"+previous.toString(16),destination:"0x"+payload.toString(16)});
      }
    }
    if(op===SUB_ONOFF){
      const onState = dec[10]===1 ? true : dec[10]===0 ? false : null;
      this._setReportedPowerState(onState);
    }
  }
  _flushAnimationNotificationSummary(reason){
    if(this.suppressedAnimationNotifications&&this.latestSuppressedNotification){
      diagnosticLog("RX","ANIMATION_NOTIFICATION_SAMPLE",Object.assign({count:this.suppressedAnimationNotifications,presetId:activeAnimatedPresetId,reason},this.latestSuppressedNotification));
    }
    this.suppressedAnimationNotifications=0;
    this.latestSuppressedNotification=null;
    this.lastNotificationSummaryAt=0;
  }
  _build(cmd,data){
    const p=new Uint8Array(20);
    p[0]=this.seq&0xff; p[1]=(this.seq>>8)&0xff; p[2]=(this.seq>>16)&0xff;
    this.seq=(this.seq+1)>0xFFFFFF?1:this.seq+1;
    p[5]=this.dst&0xff; p[6]=(this.dst>>8)&0xff;
    p[7]=cmd&0xff; p[8]=VENDOR&0xff; p[9]=(VENDOR>>8)&0xff;
    for(let i=0;i<data.length&&i<10;i++) p[10+i]=data[i];
    const an=new Uint8Array(16); an.set(this.macRev.subarray(0,4),0); an[4]=1;
    an[5]=p[0];an[6]=p[1];an[7]=p[2];an[8]=0x0f;
    let auth=new Uint8Array(aesAtt(this.sessionKey,an));
    for(let i=0;i<15;i++)auth[i]^=p[i+5];
    const mac=aesAtt(this.sessionKey,auth); p[3]=mac[0]; p[4]=mac[1];
    const iv=new Uint8Array(16); iv.set(this.macRev.subarray(0,4),1); iv[5]=1; iv[6]=p[0];iv[7]=p[1];iv[8]=p[2];
    const st=aesAtt(this.sessionKey,iv);
    for(let i=0;i<15;i++)p[i+5]^=st[i];
    return p;
  }
  async _send(cmd,data){
    const details=describeMeshCommand(cmd,data);
    const shouldLog=!(this.suppressCommandDiagnostics&&details.name==="manual.setColor");
    const started=performance.now();
    if(shouldLog) diagnosticLog("TX","COMMAND_START",Object.assign({destination:this.dst===0xFFFF?"unknown":"0x"+this.dst.toString(16)},details));
    try{
      const sendEpoch=this.sessionEpoch;
      if(!this.isSessionCurrent(sendEpoch)||!this.cmdCh) throw new Error("Bluetooth session is no longer available.");
      const pkt=this._build(cmd,data);
      try{ if(window.onCommandSent) window.onCommandSent(cmd,data,pkt); }
      catch(observerError){ diagnosticError("TX","COMMAND_OBSERVER_FAILED",observerError,{name:details.name}); }
      const withoutResponse=!!this.cmdCh.writeValueWithoutResponse;
      const writePromise=withoutResponse ? this.cmdCh.writeValueWithoutResponse(pkt) : this.cmdCh.writeValue(pkt);
      await withTimeout(writePromise,BT_TIMEOUT.WRITE,details.name+" write");
      if(!this.isSessionCurrent(sendEpoch)) throw new Error("Bluetooth session changed while sending the command.");
      if(shouldLog) diagnosticLog("TX","WRITE_COMPLETED",{name:details.name,withoutResponse,durationMs:Math.round(performance.now()-started),deviceConfirmed:false});
    }catch(e){
      diagnosticError("TX",shouldLog?"COMMAND_FAILED":"ANIMATED_WRITE_FAILED",e,{name:details.name,durationMs:Math.round(performance.now()-started),animation:this.currentAnimationFrame});
      if(e&&typeof e==="object") e.skyliteDiagnosticLogged=true;
      if(e?.name==="TimeoutError"){
        this.disconnect("write timeout: "+details.name);
        if(mesh===this){
          connectionReady=false;
          stopPresetEffect("Bluetooth write timeout");
          updateControlAvailability();
        }
      }
      throw e;
    }
  }
  setPower(on){ return this._send(OUTER, Uint8Array.of(SUB_ONOFF, on?1:0, 0x01)); }
  loadScene(id){ return this._send(OUTER, Uint8Array.of(SUB_ONOFF, id&0xff, 0x00)); }
  // Full manual control: colors, laser dots, rotation, and brightness.
  setColor(r,g,b,bright,laser,motor){ return this._send(OUTER, Uint8Array.of(SUB_CONTROL,r,g,b,laser,motor,bright,0)); }
}

/* ============================ UI wiring ============================ */
let mesh=null;
const $=id=>document.getElementById(id);
const powerToggle=$("powerToggle");
const POWER_STORAGE_KEY="skylite-power-state";
const PRESET_STORAGE_KEY="skylite-active-preset";
const DEVICE_STORAGE_KEY="skylite-bluetooth-device-id";
function loadPowerState(){
  try{ return localStorage.getItem(POWER_STORAGE_KEY)==="on"; }catch(e){ return false; }
}
function loadPresetState(){
  try{
    const id=Number(localStorage.getItem(PRESET_STORAGE_KEY));
    return PRESETS.some(([presetId])=>presetId===id) ? id : null;
  }catch(e){ return null; }
}
function loadBluetoothDeviceId(){
  try{ return localStorage.getItem(DEVICE_STORAGE_KEY); }catch(e){ return null; }
}
function saveBluetoothDevice(device){
  try{
    if(device?.id){
      localStorage.setItem(DEVICE_STORAGE_KEY,device.id);
      diagnosticLog("SELECT","DEVICE_ID_SAVED",{device:diagnosticDeviceRef(device)});
    }
  }catch(e){ diagnosticError("STORAGE","DEVICE_ID_SAVE_FAILED",e); }
}
function clearBluetoothDeviceId(){
  try{
    localStorage.removeItem(DEVICE_STORAGE_KEY);
    diagnosticLog("SELECT","SAVED_DEVICE_ID_CLEARED");
  }catch(e){ diagnosticError("STORAGE","DEVICE_ID_CLEAR_FAILED",e); }
}
function chooserCanOpenFromCurrentGesture(){
  return !document.hidden && (!navigator.userActivation||navigator.userActivation.isActive);
}
function chooserRequiredError(){
  const error=new Error("Tap Connect again to choose BlissLights.");
  error.name="ChooserRequiredError";
  error.requiresChooserTap=true;
  return error;
}
async function requestBluetoothDeviceFromChooser(forced){
  if(!chooserCanOpenFromCurrentGesture()) throw chooserRequiredError();
  diagnosticLog("SELECT","CHOOSER_OPEN",{forced});
  try{
    const device=await navigator.bluetooth.requestDevice({
      acceptAllDevices:true,
      optionalServices:[SERVICE]
    });
    diagnosticLog("SELECT","CHOOSER_SELECTED",{device:diagnosticDeviceRef(device)});
    return {device,remembered:false,source:"device chooser"};
  }catch(e){
    if(e.name==="NotFoundError") diagnosticLog("SELECT","CHOOSER_CANCELLED",undefined,"WARN");
    else diagnosticError("SELECT","CHOOSER_FAILED",e);
    throw e;
  }
}
async function selectBluetoothDevice(forceChooser=false){

function prismPulseFrame(index){

  const step=index%PRISM_TRANSITION_STEPS;

  const to=PRISM_PULSE_COLORS[(phase+1)%PRISM_PULSE_COLORS.length];
  const t=step/PRISM_TRANSITION_STEPS;
  const eased=(1-Math.cos(Math.PI*t))/2;
  const fadeOut=Math.cos(eased*Math.PI/2);
  const fadeIn=Math.sin(eased*Math.PI/2);
  const pulseWave=Math.cos(Math.PI*t);
  const intensity=PRISM_PULSE_FLOOR+(1-PRISM_PULSE_FLOOR)*pulseWave*pulseWave;
  return [
    Math.round((from[0]*fadeOut+to[0]*fadeIn)*intensity),
    Math.round((from[1]*fadeOut+to[1]*fadeIn)*intensity),
    Math.round((from[2]*fadeOut+to[2]*fadeIn)*intensity),
    0
  ];

function smoothPulseWave(index,steps=SMOOTH_PULSE_STEPS){
  const phase=(index%steps)/steps;

function cosmicPulseLaser(index){

  return Math.round(COSMIC_LASER_MIN+(255-COSMIC_LASER_MIN)*wave);

function perfectBlueFrame(index){
  const wave=smoothPulseWave(index,PERFECT_BLUE_STEPS);
  const blue=Math.round(PERFECT_BLUE_COLOR_MIN+(255-PERFECT_BLUE_COLOR_MIN)*wave);
  const laser=Math.round(PERFECT_BLUE_LASER_MIN+(255-PERFECT_BLUE_LASER_MIN)*(1-wave));

    activeMode=MODE_MANUAL;
    restoreManualSnapshot(applied.manual);
  }else if(applied?.mode===MODE_PRESET&&applied.presetId!==null){
    activeMode=MODE_PRESET;
    activePresetId=applied.presetId;
    savePresetState();
  }else if(fallbackPlan?.mode===MODE_MANUAL){
    activeMode=MODE_MANUAL;
    restoreManualSnapshot(fallbackPlan.manual);
  }else{
    activeMode=MODE_PRESET;
    activePresetId=fallbackPlan?.presetId??DEFAULT_PRESET_ID;
    savePresetState();
  }
  renderActiveMode();
  diagnosticLog("STATE","DESIRED_STATE_ROLLED_BACK",Object.assign({reason},describeDesiredOutputPlan(captureDesiredOutputPlan())),"WARN");
}
function appliedOutputPlan(runMesh){
  const applied=runMesh?.appliedState;
  if(applied?.mode===MODE_MANUAL&&applied.manual){
    return {mode:MODE_MANUAL,presetId:null,manual:manualSnapshot(applied.manual)};
  }
  if(applied?.mode===MODE_PRESET&&applied.presetId!==null){
    return {mode:MODE_PRESET,presetId:applied.presetId,manual:null};
  }
  return null;
}
async function recoverAppliedOutput(runMesh,reason){
  const plan=appliedOutputPlan(runMesh);
  if(!plan||!powerOn||!isConnectedMesh(runMesh)) return false;
  const recovered=plan.mode===MODE_MANUAL
    ? await applyManualSnapshot(plan.manual,reason)
    : await applyPreset(plan.presetId,reason);
  if(recovered&&mesh===runMesh) setStatus("connected","Recovered the last applied output after a transient command failure");
  return recovered;
}
async function selectPreset(id,send=true,source="user"){
  const runMesh=mesh;
  const fallbackPlan=captureDesiredOutputPlan();
  const revision=++desiredRevision;
  activeMode=MODE_PRESET;
  setPresetSelection(id,source,false);
  renderActiveMode();
  if(!send){
    savePresetState();
    stopPresetEffect("preset selected without sending");
    return true;
  }
  const succeeded=await applyPreset(id,source);
  if(revision!==desiredRevision||mesh!==runMesh) return succeeded;
  if(succeeded){
    savePresetState();
    return true;
  }
  restoreDesiredFromApplied(runMesh,fallbackPlan,"preset command failed");
  await recoverAppliedOutput(runMesh,"preset rollback recovery");
  return false;
}
async function activateTab(tabId){
  const previousTab=document.querySelector('.tab-button.active')?.dataset.tab||"unknown";
  if(previousTab===tabId) return;
  const runMesh=mesh;
  const fallbackPlan=captureDesiredOutputPlan();
  const revision=++desiredRevision;
  diagnosticLog("UI","TAB_CHANGE",{previous:previousTab,next:tabId});
  activeMode=tabId==='lightControlTab'?MODE_MANUAL:MODE_PRESET;
  renderActiveMode();
  const succeeded=activeMode===MODE_MANUAL
    ? await applyManualSnapshot(manualSnapshot(),"light control tab opened")
    : await applyPreset(activePresetId,"presets tab restore");
  if(revision!==desiredRevision||mesh!==runMesh) return;
  if(!succeeded){
    restoreDesiredFromApplied(runMesh,fallbackPlan,"tab change command failed");
    $(activeMode===MODE_MANUAL?"lightControlTabButton":"presetsTabButton")?.focus();
    await recoverAppliedOutput(runMesh,"tab rollback recovery");
  }
}
document.querySelectorAll('.tab-button').forEach(btn=>{
  btn.addEventListener('click', ()=> activateTab(btn.dataset.tab));
  btn.addEventListener('keydown',event=>{
    if(!["ArrowLeft","ArrowRight","Home","End"].includes(event.key)) return;
    const tabs=Array.from(document.querySelectorAll('.tab-button:not([disabled])'));
    if(!tabs.length) return;
    event.preventDefault();
    const current=tabs.indexOf(btn);
    const next=event.key==="Home"?tabs[0]
      :event.key==="End"?tabs[tabs.length-1]
      :tabs[(current+(event.key==="ArrowRight"?1:-1)+tabs.length)%tabs.length];
    next.focus();
    activateTab(next.dataset.tab);
  });
});
if(powerToggle){
  powerToggle.addEventListener("change", async()=>{
    const next = powerToggle.checked;
    const runMesh=mesh;
    const previousPower=powerOn;
    const fallbackPlan=captureDesiredOutputPlan();
    const revision=++powerRequestRevision;
    diagnosticLog("UI","POWER_TOGGLE",{previous:powerOn?"ON":"OFF",requested:next?"ON":"OFF"});
    stopPresetEffect("power toggle");
    powerTransactionPending=true;
    updateControlAvailability();
    const defaultPlan={mode:MODE_PRESET,presetId:DEFAULT_PRESET_ID,manual:null};
    const succeeded=await cmd(async queuedMesh=>{
      if(next){
        await tryPreloadDesiredOutput(queuedMesh,defaultPlan,"power toggle");
        await sleep(CONNECT_PRELOAD_SETTLE_MS);
        await queuedMesh.setPower(true);
        queuedMesh._setCommandedPowerState(true,"power toggle");
        await writeDesiredOutput(queuedMesh,defaultPlan,"power toggle post-power restore");
        markAppliedOutput(queuedMesh,defaultPlan,"power toggle");
      }else{
        await queuedMesh.setPower(false);
        queuedMesh._setCommandedPowerState(false,"power toggle");
      }
      return true;
    });
    if(revision!==powerRequestRevision) return;
    powerTransactionPending=false;
    if(mesh!==runMesh){ updateControlAvailability(); return; }
    if(succeeded&&next){
      activeMode=MODE_PRESET;
      setPresetSelection(DEFAULT_PRESET_ID,"power-on default",true);
      renderActiveMode();
    }else if(!succeeded){
      powerOn=runMesh?.appliedState?.power===next?next:previousPower;
      if(powerOn&&next){
        activeMode=MODE_PRESET;
        setPresetSelection(DEFAULT_PRESET_ID,"power-on partial completion",true);
        renderActiveMode();
      }else if(powerOn){
        restoreDesiredFromApplied(runMesh,fallbackPlan,"power command failed");
      }
      syncPowerToggle();
    }
    updateControlAvailability();
    if(!succeeded&&powerOn&&isConnectedMesh(runMesh)){
      const recovered=next
        ? await applyPreset(DEFAULT_PRESET_ID,"power-on output recovery")
        : await recoverAppliedOutput(runMesh,"power rollback recovery");
      if(recovered) setStatus("connected","Recovered after a transient power command failure");
    }
  });
}

const MAIN_STATUS_IDLE='Tap Connect, then pick "BlissLights".';
function setStatus(state,detail=""){

  if(state==="connected"){
    s.textContent="Connected ✓";
    s.className="status on";
  }else if(state==="error"){
    s.textContent="Can't connect";

  }else{

    s.className="status ";
  }
  diagnosticLog("UI","MAIN_STATUS",{state,displayed:s.textContent,detail},state==="error"?"WARN":"INFO");
}

let connectInProgress=false;
let forceChooserNextConnect=false;
let connectAttemptCounter=0;
let activeConnectAttempt=null;
let foregroundResumeDevice=null;
let foregroundResumeWanted=false;
let foregroundResumeGeneration=0;
let foregroundResumeTimer=null;
function cancelForegroundResume(reason,{clearDevice=false}={}){
  foregroundResumeGeneration++;
  foregroundResumeWanted=false;
  if(foregroundResumeTimer!==null){
    clearTimeout(foregroundResumeTimer);
    foregroundResumeTimer=null;
  }
  if(clearDevice) foregroundResumeDevice=null;
  diagnosticLog("LIFECYCLE","FOREGROUND_RESUME_CANCELLED",{reason,clearDevice});
}
function connectAttemptAbortError(reason){
  const error=new Error("Connection stopped because the app left the foreground. Tap Connect to retry.");
  error.name="AbortError";
  error.reason=reason;
  return error;
}
function assertConnectAttemptActive(attempt,stage){
  if(!attempt.cancelled) return;
  diagnosticLog("CONNECT","ATTEMPT_STOPPED_LATE",{attemptId:attempt.id,stage,reason:attempt.cancelReason},"WARN");
  throw connectAttemptAbortError(attempt.cancelReason);
}
$("connectBtn").onclick=async()=>{
  diagnosticLog("CONNECT","CONNECT_CLICK",{inProgress:connectInProgress,alreadyConnected:!!(mesh?.sessionKey&&mesh.device?.gatt?.connected),forceChooserNextConnect});
  if(!navigator.bluetooth){
    diagnosticLog("CONNECT","CONNECT_BLOCKED",{reason:"Web Bluetooth unavailable"},"ERROR");
    setStatus("error","This browser has no Bluetooth. Open this page in Bluefy.");
    return;
  }
  if(connectInProgress){ diagnosticLog("CONNECT","CONNECT_CLICK_IGNORED",{reason:"attempt already in progress"},"WARN"); return; }
  if(mesh?.sessionKey&&mesh.device?.gatt?.connected){ setStatus("connected","Already connected"); return; }
  cancelForegroundResume("manual Connect",{clearDevice:true});
  let selection=null;
  let usedFallbackChooser=false;
  let forcedChooserForAttempt=false;
  const attemptId=++connectAttemptCounter;
  const attempt={id:attemptId,cancelled:false,cancelReason:""};
  const attemptStarted=performance.now();
  activeConnectAttempt=attempt;
  connectInProgress=true;
  $("connectBtn").disabled=true;
  $("connectBtn").setAttribute("aria-busy","true");
  try{
    diagnosticLog("CONNECT","ATTEMPT_START",{attemptId,forceChooser:forceChooserNextConnect});
    stopPresetEffect();
    connectionReady=false;
    updateControlAvailability();
    if(mesh) mesh.disconnect("new connect attempt");
    mesh=null;
    const forceChooser=forceChooserNextConnect;
    forcedChooserForAttempt=forceChooser;
    forceChooserNextConnect=false;
    selection=await selectBluetoothDevice(forceChooser);
    if(document.hidden&&!attempt.cancelled){
      diagnosticLog("CONNECT","SELECTION_RESOLVED_WHILE_HIDDEN",{attemptId},"WARN");
      await sleep(80); // Bluefy may briefly hide the page while dismissing its native picker.
      if(document.hidden&&!attempt.cancelled){
        attempt.cancelled=true;
        attempt.cancelReason="device selection completed while app remained hidden";
      }
    }
    assertConnectAttemptActive(attempt,"device selection");
    diagnosticLog("CONNECT","DEVICE_SELECTED",{attemptId,source:selection.source,device:diagnosticDeviceRef(selection.device)});
    let nextMesh=new TelinkMesh();
    mesh=nextMesh;
    if(attempt.cancelled){ nextMesh.disconnect("cancelled before GATT connect"); assertConnectAttemptActive(attempt,"before GATT connect"); }
    try{
      await nextMesh.connect(selection.device);
    }catch(connectError){
      const failedStage=connectError?.telinkConnectStage||nextMesh.lastConnectFailureStage;
      const retryableNativeStage=["gatt connect","service discovery","characteristic discovery"].includes(failedStage);
      const canUseChooserFallback=selection.remembered&&connectError?.name!=="AbortError"&&
        connectError?.name!=="TimeoutError"&&retryableNativeStage&&!attempt.cancelled&&
        chooserCanOpenFromCurrentGesture();
      if(!canUseChooserFallback) throw connectError;
      diagnosticLog("CONNECT","REMEMBERED_GATT_CHOOSER_FALLBACK",{
        attemptId,reason:connectError?.message||String(connectError),device:diagnosticDeviceRef(selection.device)
      },"WARN");
      mesh=null; // Native picker visibility changes must not cancel this attempt.
      selection=null;
      usedFallbackChooser=true;
      try{
        selection=await selectBluetoothDevice(true);
      }catch(chooserError){
        forceChooserNextConnect=true;
        diagnosticError("CONNECT","FALLBACK_CHOOSER_FAILED",chooserError,{attemptId});
        throw chooserError;
      }
      if(document.hidden&&!attempt.cancelled){
        diagnosticLog("CONNECT","FALLBACK_SELECTION_RESOLVED_WHILE_HIDDEN",{attemptId},"WARN");
        await sleep(80);
        if(document.hidden&&!attempt.cancelled){
          attempt.cancelled=true;
          attempt.cancelReason="fallback device selection completed while app remained hidden";
        }
      }
      assertConnectAttemptActive(attempt,"fallback device selection");
      diagnosticLog("CONNECT","FALLBACK_DEVICE_SELECTED",{attemptId,source:selection.source,device:diagnosticDeviceRef(selection.device)});
      nextMesh=new TelinkMesh();
      mesh=nextMesh;
      await nextMesh.connect(selection.device);
    }
    if(attempt.cancelled){ nextMesh.disconnect("cancelled after GATT connect"); assertConnectAttemptActive(attempt,"after GATT connect"); }
    saveBluetoothDevice(nextMesh.device);
    syncPowerToggle();
    connectionReady=true;
    updateControlAvailability();
    finalizeRestoredOutput(nextMesh);
    diagnosticLog("CONNECT","ATTEMPT_SUCCESS",{attemptId,durationMs:Math.round(performance.now()-attemptStarted),source:selection.source,powerKnown:nextMesh.powerStateKnown,power:powerOn?"ON":"OFF",presetId:activePresetId,presetSource:nextMesh.presetStateSource});
    setStatus("connected","Connection and Telink login completed");
  }catch(e){
    const failedConnectStage=e?.telinkConnectStage||mesh?.lastConnectFailureStage||"unknown";
    if(mesh){ mesh.disconnect("connect handler error cleanup"); mesh=null; }
    connectionReady=false;
    powerTransactionPending=false;
    updateControlAvailability();
    const message=e.message||String(e);
    if(attempt.cancelled){
      diagnosticLog("CONNECT","ATTEMPT_CANCELLED_BY_LIFECYCLE",{attemptId,reason:attempt.cancelReason,durationMs:Math.round(performance.now()-attemptStarted)},"WARN");
      setStatus("idle","Connection stopped for "+attempt.cancelReason);
    }else{
      diagnosticError("CONNECT","ATTEMPT_FAILED",e,{attemptId,durationMs:Math.round(performance.now()-attemptStarted),selectionSource:selection?.source||"none",connectStage:failedConnectStage});
      if(e?.requiresChooserTap||usedFallbackChooser) forceChooserNextConnect=true;
      if(!selection&&e.name==="NotFoundError"){
        if(forcedChooserForAttempt) forceChooserNextConnect=true;
        setStatus("idle","Device chooser cancelled");
      }
      else if(selection?.remembered&&!message.startsWith("Light rejected pairing")){
        forceChooserNextConnect=true;
        diagnosticLog("CONNECT","FORCE_CHOOSER_ARMED",{attemptId,reason:message},"WARN");
        setStatus("error",message);
      }else setStatus("error",message);
    }
  }finally{
    if(activeConnectAttempt===attempt) activeConnectAttempt=null;
    connectInProgress=false;
    $("connectBtn").disabled=false;
    $("connectBtn").removeAttribute("aria-busy");
  }
};

function scheduleForegroundResume(reason="page visible"){
  if(!foregroundResumeWanted||!foregroundResumeDevice||document.hidden) return;
  const generation=foregroundResumeGeneration;
  if(foregroundResumeTimer!==null) clearTimeout(foregroundResumeTimer);
  foregroundResumeTimer=setTimeout(()=>{
    foregroundResumeTimer=null;
    resumeAnimatedPresetInForeground(generation,reason);
  },350);
  diagnosticLog("LIFECYCLE","FOREGROUND_RESUME_SCHEDULED",{reason,generation,delayMs:350});
}
async function resumeAnimatedPresetInForeground(generation,reason){
  if(generation!==foregroundResumeGeneration||!foregroundResumeWanted||!foregroundResumeDevice||document.hidden) return;
  if(connectInProgress||activeConnectAttempt){
    diagnosticLog("LIFECYCLE","FOREGROUND_RESUME_DEFERRED",{reason,generation,connectInProgress});
    // The cancelled automatic attempt schedules the next try from its own
    // finally block. Do not poll here while a native GATT promise unwinds.
    return;
  }
  if(mesh?.sessionKey&&mesh.device?.gatt?.connected){
    foregroundResumeWanted=false;
    diagnosticLog("LIFECYCLE","FOREGROUND_RESUME_SKIPPED",{reason:"connection already restored"});
    return;
  }
  const device=foregroundResumeDevice;
  const attemptId=++connectAttemptCounter;
  const attempt={id:attemptId,cancelled:false,cancelReason:"",automatic:true};
  const attemptStarted=performance.now();
  activeConnectAttempt=attempt;
  connectInProgress=true;
  $("connectBtn").disabled=true;
  $("connectBtn").setAttribute("aria-busy","true");
  diagnosticLog("CONNECT","FOREGROUND_RESUME_START",{attemptId,reason,device:diagnosticDeviceRef(device)});
  try{
    stopPresetEffect("foreground reconnect");
    connectionReady=false;
    updateControlAvailability();
    if(mesh) mesh.disconnect("foreground reconnect replacement");
    const nextMesh=new TelinkMesh();
    mesh=nextMesh;
    await nextMesh.connect(device,{assertPower:false,connectionReason:"foreground resume"});
    assertConnectAttemptActive(attempt,"foreground GATT restore");
    if(document.hidden){
      attempt.cancelled=true;
      attempt.cancelReason="app hidden during foreground reconnect";
      nextMesh.disconnect(attempt.cancelReason);
      assertConnectAttemptActive(attempt,"foreground visibility check");
    }
    saveBluetoothDevice(nextMesh.device);
    syncPowerToggle();
    connectionReady=true;
    updateControlAvailability();
    finalizeRestoredOutput(nextMesh);
    foregroundResumeWanted=false;
    diagnosticLog("CONNECT","FOREGROUND_RESUME_SUCCESS",{
      attemptId,
      durationMs:Math.round(performance.now()-attemptStarted),
      presetId:activePresetId,
      power:powerOn?"ON":"OFF"
    });
    setStatus("connected","Animated preset resumed after returning to Bluefy");
  }catch(error){
    if(mesh){ mesh.disconnect("foreground reconnect cleanup"); mesh=null; }
    connectionReady=false;
    powerTransactionPending=false;
    updateControlAvailability();
    if(attempt.cancelled||document.hidden){
      diagnosticLog("CONNECT","FOREGROUND_RESUME_INTERRUPTED",{
        attemptId,
        reason:attempt.cancelReason||"page hidden",
        durationMs:Math.round(performance.now()-attemptStarted)
      },"WARN");
      setStatus("idle","Foreground reconnect paused");
    }else{
      foregroundResumeWanted=false;
      foregroundResumeDevice=null;
      forceChooserNextConnect=true;
      diagnosticError("CONNECT","FOREGROUND_RESUME_FAILED",error,{
        attemptId,
        stage:error?.telinkConnectStage||"unknown",
        durationMs:Math.round(performance.now()-attemptStarted),
        fallback:"Tap Connect to choose BlissLights"
      });
      setStatus("error",error?.message||String(error));
    }
  }finally{
    if(activeConnectAttempt===attempt) activeConnectAttempt=null;
    connectInProgress=false;
    $("connectBtn").disabled=false;
    $("connectBtn").removeAttribute("aria-busy");
    if(!document.hidden&&foregroundResumeWanted) scheduleForegroundResume("interrupted attempt finished");
  }
}

// Commands are serialized per authenticated mesh. Capturing both the mesh
// and its epoch prevents a delayed command from crossing into a reconnect.
function cmd(fn){
  const runMesh=mesh;
  if(!isConnectedMesh(runMesh)){
    diagnosticLog("TX","COMMAND_REJECTED",{reason:"no authenticated mesh session"},"WARN");
    setStatus("error","Command requested without a connection");
    return Promise.resolve(false);
  }
  const epoch=runMesh.sessionEpoch;
  runMesh.commandQueueDepth++;
  const queued=runMesh.commandChain.then(async()=>{
    try{
      if(mesh!==runMesh||!runMesh.isSessionCurrent(epoch)){
        diagnosticLog("TX","STALE_COMMAND_SKIPPED",{epoch,currentEpoch:runMesh.sessionEpoch},"WARN");
        return false;
      }
      const outcome=await fn(runMesh,epoch);
      if(outcome===false) return false;
      if(mesh!==runMesh||!runMesh.isSessionCurrent(epoch)){
        diagnosticLog("TX","COMMAND_COMPLETED_STALE",{epoch,currentEpoch:runMesh.sessionEpoch},"WARN");
        return false;
      }
      if($("status").textContent==="Can't connect"){
        setStatus("connected","A later command succeeded after a transient failure");
      }
      await sleep(25); // small gap so writes don't stampede
      return true;
    }
    catch(e){
      if(!e?.skyliteDiagnosticLogged) diagnosticError("TX","COMMAND_QUEUE_FAILED",e);
      if(mesh===runMesh) setStatus("error","Send failed: "+(e.message||e));
      return false;
    }finally{
      runMesh.commandQueueDepth=Math.max(0,runMesh.commandQueueDepth-1);
    }
  });
  runMesh.commandChain=queued.then(()=>undefined,()=>undefined);
  return queued;
}

function manualSnapshot(value=st){
  return {r:!!value.r,g:!!value.g,b:!!value.b,laser:!!value.laser,bright:Number(value.bright),motor:value.motor?255:0};
}
function restoreManualSnapshot(snapshot){
  if(!snapshot) return;
  st.r=!!snapshot.r; st.g=!!snapshot.g; st.b=!!snapshot.b; st.laser=!!snapshot.laser;
  st.bright=Number(snapshot.bright); st.motor=snapshot.motor?255:0;
  refreshManualUI();
}
function captureDesiredOutputPlan(){
  return activeMode===MODE_MANUAL
    ? {mode:MODE_MANUAL,presetId:null,manual:manualSnapshot()}
    : {mode:MODE_PRESET,presetId:activePresetId,manual:null};
}
function describeDesiredOutputPlan(plan){
  if(plan.mode===MODE_MANUAL) return {mode:MODE_MANUAL,manual:plan.manual};
  return {
    mode:MODE_PRESET,
    presetId:plan.presetId,
    preset:PRESETS.find(([id])=>id===plan.presetId)?.[1]||"Unknown",
    animated:isAnimatedPreset(plan.presetId)
  };
}
async function writeDesiredOutput(runMesh,plan,reason){
  diagnosticLog("STATE","DESIRED_OUTPUT_WRITE",Object.assign({reason},describeDesiredOutputPlan(plan)));
  if(plan.mode===MODE_MANUAL){
    const manual=plan.manual;
    return runMesh.setColor(
      manual.r?255:0,manual.g?255:0,manual.b?255:0,
      BRIGHT_VALUES[manual.bright],manual.laser?255:0,manual.motor
    );
  }
  if(isAnimatedPreset(plan.presetId)) return writeAnimatedPresetFrame(runMesh,plan.presetId,0);
  return runMesh.loadScene(plan.presetId);
}
async function tryPreloadDesiredOutput(runMesh,plan,reason){
  diagnosticLog("STATE","OUTPUT_PRELOAD_START",Object.assign({reason},describeDesiredOutputPlan(plan)));
  try{
    await writeDesiredOutput(runMesh,plan,"preload");
    diagnosticLog("STATE","OUTPUT_PRELOAD_DONE",Object.assign({deviceConfirmed:false},describeDesiredOutputPlan(plan)));
    return true;
  }catch(error){
    const sessionHealthy=!!runMesh.sessionKey&&!!runMesh.device?.gatt?.connected;
    diagnosticError("STATE","OUTPUT_PRELOAD_FAILED",error,{sessionHealthy,willContinue:sessionHealthy&&error?.name!=="TimeoutError"});
    if(!sessionHealthy||error?.name==="TimeoutError") throw error;
    return false;
  }
}
function markAppliedOutput(runMesh,plan,reason){
  runMesh.appliedState.mode=plan.mode;
  runMesh.appliedState.presetId=plan.mode===MODE_PRESET?plan.presetId:null;
  runMesh.appliedState.manual=plan.mode===MODE_MANUAL?manualSnapshot(plan.manual):null;
  runMesh.presetStateSource="app-commanded";
  diagnosticLog("STATE","OUTPUT_APPLIED_BY_WRITE",Object.assign({reason,deviceConfirmed:false},describeDesiredOutputPlan(plan)));
}
function finalizeRestoredOutput(runMesh){
  const plan=runMesh.restoredOutputPlan;
  if(!plan||!isConnectedMesh(runMesh)) return;
  renderActiveMode();
  if(plan.mode===MODE_PRESET&&isAnimatedPreset(plan.presetId)){
    beginPresetEffect(presetEffectGeneration,runMesh,plan.presetId,1,"successful Connect restore");
  }else{
    stopPresetEffect("connected static output");
  }
  runMesh.restoredOutputPlan=null;
}

setPresetSelection(activePresetId,"storage restore",false);

// Full-state color command (0x47). Each queued operation owns an immutable
// snapshot so rapid taps cannot read a later, unrelated UI state.
function applyManualSnapshot(snapshot,reason="manual control"){
  stopPresetEffect(reason);
  hidePresetSelection();
  diagnosticLog("MANUAL","STATE_REQUEST",{reason,r:snapshot.r,g:snapshot.g,b:snapshot.b,laser:snapshot.laser,brightness:snapshot.bright,rotation:!!snapshot.motor,rememberedPresetId:activePresetId});
  if(!powerOn||activeMode!==MODE_MANUAL){
    diagnosticLog("MANUAL","STATE_ABORTED",{reason:!powerOn?"power is off":"manual mode is inactive"},"WARN");
    return Promise.resolve(false);
  }
  return cmd(async runMesh=>{
    if(activeMode!==MODE_MANUAL||!powerOn) return false;
    await runMesh.setColor(
      snapshot.r?255:0,snapshot.g?255:0,snapshot.b?255:0,
      BRIGHT_VALUES[snapshot.bright],snapshot.laser?255:0,snapshot.motor
    );
    markAppliedOutput(runMesh,{mode:MODE_MANUAL,presetId:null,manual:snapshot},reason);
    return true;
  });
}
async function requestManualChange(mutator,reason){
  const runMesh=mesh;
  const previous=manualSnapshot();
  const fallbackPlan=captureDesiredOutputPlan();
  const revision=++desiredRevision;
  mutator();
  activeMode=MODE_MANUAL;
  refreshManualUI();
  renderActiveMode();
  const desired=manualSnapshot();
  const succeeded=await applyManualSnapshot(desired,reason);
  if(revision!==desiredRevision||mesh!==runMesh) return succeeded;
  if(!succeeded){
    restoreDesiredFromApplied(runMesh,Object.assign({},fallbackPlan,{manual:previous}),"manual command failed");
    diagnosticLog("MANUAL","STATE_ROLLED_BACK",{reason,mode:activeMode,restored:manualSnapshot()},"WARN");
    await recoverAppliedOutput(runMesh,"manual rollback recovery");
  }
  return succeeded;
}

// This firmware ignores the nominal dedicated motor command, so rotation
// is sent in the same complete state packet as the other manual controls.
$("rotationToggle").addEventListener("change",()=>{
