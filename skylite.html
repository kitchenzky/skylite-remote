// --- Full-screen diagnostic log ---
function currentDiagnosticSnapshot(){
  const connected=!!(mesh?.sessionKey&&mesh.device?.gatt?.connected);
  const gattConnected=!!mesh?.device?.gatt?.connected;
  const preset=PRESETS.find(([id])=>id===activePresetId);
  const activeTab=document.querySelector('.tab-button.active')?.dataset.tab||"unknown";
  const desiredOutput=activeMode===MODE_PRESET
    ? {type:MODE_PRESET,preset:preset?.[1]||String(activePresetId),presetId:activePresetId}
    : {type:MODE_MANUAL,state:manualSnapshot(),rememberedPreset:preset?.[1]||String(activePresetId),rememberedPresetId:activePresetId};
  const animationMetricsActive=connected&&activeAnimatedPresetId!==null;
  return {
    connection:connected?"CONNECTED":(gattConnected?"GATT ONLY":"DISCONNECTED"),
    power:powerOn?"ON":"OFF",
    powerSource:connected&&mesh?.powerStateKnown?mesh.powerStateSource:"stored/UI; not device-confirmed",
    mode:activeMode,
    output:desiredOutput,
    preset:preset?.[1]||String(activePresetId),
    presetId:activePresetId,
    presetSource:connected&&mesh?.presetStateSource==="app-commanded"?"app-commanded":"stored/UI; not device-confirmed",
    tab:activeTab,
    manual:{r:st.r,g:st.g,b:st.b,laser:st.laser,brightness:st.bright,rotation:!!st.motor},
    applied:connected?Object.assign({meaning:"Bluetooth write completed; not hardware-confirmed"},mesh.appliedState):null,
    commandQueueDepth:mesh?.commandQueueDepth||0,
    animation:{
      presetId:activeAnimatedPresetId,
      generation:presetEffectGeneration,
      lastLocalWriteCompletedAt:presetEffectLastFrameAt?new Date(presetEffectLastFrameAt).toISOString():null,
      localWriteCount:animationMetricsActive?(mesh?.animationLocalWriteCount||0):0,
      lastLocalFrame:animationMetricsActive?(mesh?.lastAnimationLocalFrame||null):null,
      deviceFeedbackCount:animationMetricsActive?(mesh?.animationFeedbackCount||0):0,
      deviceFeedbackChangeCount:animationMetricsActive?(mesh?.animationFeedbackChangeCount||0):0,
      repeatedDeviceFeedbackCount:animationMetricsActive?(mesh?.animationRepeatedFeedbackCount||0):0,
      lastDeviceFeedbackAt:animationMetricsActive&&mesh?.lastAnimationFeedbackAt?new Date(mesh.lastAnimationFeedbackAt).toISOString():null,
      deviceFeedbackAgeMs:animationMetricsActive&&mesh?.lastAnimationFeedbackAt?Date.now()-mesh.lastAnimationFeedbackAt:null,
      lastDeviceFeedbackProgressAt:animationMetricsActive&&mesh?.lastAnimationFeedbackProgressAt?new Date(mesh.lastAnimationFeedbackProgressAt).toISOString():null,
      deviceFeedbackProgressAgeMs:animationMetricsActive&&mesh?.lastAnimationFeedbackProgressAt?Date.now()-mesh.lastAnimationFeedbackProgressAt:null,
      lastDeviceFeedback:animationMetricsActive?(mesh?.lastAnimationFeedback||null):null,
      deviceFeedbackStalled:animationMetricsActive&&!!mesh?.animationFeedbackStalled,
      consecutiveFailures:presetEffectConsecutiveFailures,
      frameInFlight:presetEffectFrameInFlight,
      frameInFlightSince:presetEffectFrameStartedAt?new Date(presetEffectFrameStartedAt).toISOString():null,
      wakeLock:!!presetEffectWakeLock,
      bluefyScreenDimDisabled,
      bluefyScreenDimDesiredEnabled
    },
    controls:{connectionReady,settingsEnabled:connectionReady&&powerOn,powerTransactionPending},
    foregroundResume:{wanted:foregroundResumeWanted,deviceRetained:!!foregroundResumeDevice,generation:foregroundResumeGeneration},
    visibility:document.visibilityState,
    forceChooserNextConnect,
    rememberedDeviceApi:typeof navigator.bluetooth?.getDevices==="function",
    logPersistence:diagnosticPersistenceState,
    logPersistenceError:diagnosticPersistenceError||null
  };
}
function diagnosticOutputMatchesApplied(state){
  if(!state.applied||state.applied.mode!==state.mode) return false;
  if(state.mode===MODE_PRESET) return state.applied.presetId===state.output.presetId;
  const desired=state.output.state;
  const applied=state.applied.manual;
  return !!applied&&["r","g","b","laser","bright","motor"].every(key=>applied[key]===desired[key]);
}
function updateDiagnosticSummary(){
  const summary=$("diagnosticsSummary");
  if(!summary) return;
  const state=currentDiagnosticSnapshot();
  summary.innerHTML=
    '<div><span>Connection</span><strong>'+state.connection+'</strong></div>'+
    '<div><span>Power</span><strong>'+state.power+' · '+(state.powerSource==="device-reported"?'device':state.powerSource==="app-commanded"?'app command':'cached')+'</strong></div>'+
    '<div><span>Output</span><strong>'+(state.mode===MODE_MANUAL?'Light Control':state.preset)+'</strong></div>'+
    '<div><span>Output source</span><strong>'+(diagnosticOutputMatchesApplied(state)?'app command':'UI only · unconfirmed')+'</strong></div>';
}
function buildDiagnosticReport(){
  const state=currentDiagnosticSnapshot();
  return [
    "Kitchenzky Sky Remote — Diagnostic Report",
    "Build: "+APP_BUILD,
    "Exported: "+new Date().toISOString(),
    "Session: "+diagnosticSessionId,
    "Log persistence: "+diagnosticPersistenceState+(diagnosticPersistenceError?" ("+diagnosticPersistenceError+")":""),
    "Current state: "+JSON.stringify(state),
    "Important: applied means the Bluetooth write completed; device feedback is still not proof that the LEDs visibly changed.",
    "Bluetooth identifiers use session-local aliases. Passwords, login challenges and session keys are excluded.",
    "",
    "--- SAVED EVENTS (oldest to newest) ---",
    diagnosticEntries.join("\n")
  ].join("\n");
}
function openDiagnostics(){
  diagnosticLog("DIAG","VIEW_OPEN",currentDiagnosticSnapshot());
  $("diagnosticsView").hidden=false;
  document.body.classList.add("diagnostics-open");
  $("mainApp").inert=true;
  $("mainApp").setAttribute("aria-hidden","true");
  $("diagnosticsButton").setAttribute("aria-expanded","true");
  $("diagnosticsToast").textContent="";
  updateDiagnosticSummary();
  renderDiagnosticEntries(true);
  $("diagnosticsBack").focus();
}
function closeDiagnostics(){
  diagnosticLog("DIAG","VIEW_CLOSE");
  $("diagnosticsView").hidden=true;
  document.body.classList.remove("diagnostics-open");
  $("mainApp").inert=false;
  $("mainApp").removeAttribute("aria-hidden");
  $("diagnosticsButton").setAttribute("aria-expanded","false");
  $("diagnosticsButton").focus();
}
function fallbackCopyDiagnosticText(text){
  const area=document.createElement("textarea");
  area.value=text;
  area.setAttribute("readonly","");
  area.style.position="fixed";
  area.style.opacity="0";
  document.body.appendChild(area);
  area.select();
  area.setSelectionRange?.(0,text.length);
  const copied=document.execCommand("copy");
  area.remove();
  if(!copied) throw new Error("Clipboard copy was rejected");
}
async function copyDiagnostics(){
  mesh?._flushAnimationNotificationSummary?.("diagnostic report copied");
  diagnosticLog("DIAG","COPY_REQUESTED",currentDiagnosticSnapshot());
  const report=buildDiagnosticReport();
  try{
    if(navigator.clipboard?.writeText) await navigator.clipboard.writeText(report);
    else fallbackCopyDiagnosticText(report);
    $("diagnosticsToast").textContent="Copied ✓";
    diagnosticLog("DIAG","COPY_OK",{characters:report.length});
  }catch(e){
    try{
      fallbackCopyDiagnosticText(report);
      $("diagnosticsToast").textContent="Copied ✓";
      diagnosticLog("DIAG","COPY_OK_FALLBACK",{characters:report.length});
    }catch(fallbackError){
      $("diagnosticsToast").textContent="Copy failed. Touch and hold the log to select it.";
      diagnosticError("DIAG","COPY_FAILED",fallbackError);
    }
  }
}
function clearDiagnostics(){
  if(!window.confirm("Clear the saved diagnostic history? Your projector and app settings will stay remembered.")) return;
  diagnosticEntries=[];
  persistDiagnosticEntries();
  diagnosticLog("DIAG","HISTORY_CLEARED");
  updateDiagnosticSummary();
  renderDiagnosticEntries(true);
  $("diagnosticsToast").textContent="Diagnostic history cleared ✓";
}
$("diagnosticsButton").addEventListener("click",openDiagnostics);
$("diagnosticsBack").addEventListener("click",closeDiagnostics);
$("diagnosticsCopy").addEventListener("click",copyDiagnostics);
$("diagnosticsClear").addEventListener("click",clearDiagnostics);
document.addEventListener("keydown",event=>{
  const view=$("diagnosticsView");
  if(event.key==="Escape"&&!view.hidden){ closeDiagnostics(); return; }
  if(event.key!=="Tab"||view.hidden) return;
  const focusable=Array.from(view.querySelectorAll('button:not([disabled]),[tabindex="0"]'));
  if(!focusable.length) return;
  const first=focusable[0],last=focusable[focusable.length-1];
  if(event.shiftKey&&document.activeElement===first){ event.preventDefault(); last.focus(); }
  else if(!event.shiftKey&&document.activeElement===last){ event.preventDefault(); first.focus(); }
});
renderDiagnosticEntries();

// --- Clean disconnect ---
// The lamp allows only one connection and STOPS ADVERTISING while it
// thinks it's connected. If we don't release it when leaving, it becomes
// a "ghost connection": invisible to scans until power-cycled, even when
// off. So actively disconnect when the page is hidden/closed, freeing the
// lamp to advertise again -- this is what makes it findable while off.
function releaseLamp(reason="unknown lifecycle event"){
  const now=performance.now();
  const releaseStillNeeded=!!(mesh?.sessionKey||mesh?.device?.gatt?.connected||(activeConnectAttempt&&!activeConnectAttempt.cancelled));
  if(lastLampReleaseAt&&now-lastLampReleaseAt<1500&&!releaseStillNeeded){
    diagnosticLog("LIFECYCLE","RELEASE_SKIPPED_DUPLICATE",{reason,previousReleaseMsAgo:Math.round(now-lastLampReleaseAt)});
    return;
  }
  lastLampReleaseAt=now;
  const releaseSnapshot=currentDiagnosticSnapshot();
  const resumableLifecycleReason=reason==="visibility hidden"||reason==="pagehide persisted";
  const canResumeAnimatedPreset=resumableLifecycleReason&&connectionReady&&!powerTransactionPending&&
    powerOn&&activeAnimatedPresetId!==null&&!!mesh?.sessionKey&&!!mesh?.device;
  if(resumableLifecycleReason){
    foregroundResumeGeneration++;
    if(foregroundResumeTimer!==null){ clearTimeout(foregroundResumeTimer); foregroundResumeTimer=null; }
    if(canResumeAnimatedPreset){
      foregroundResumeDevice=mesh.device;
      foregroundResumeWanted=true;
      diagnosticLog("LIFECYCLE","FOREGROUND_RESUME_ARMED",{
        generation:foregroundResumeGeneration,
        presetId:activePresetId,
        device:diagnosticDeviceRef(foregroundResumeDevice)
      });
    }
  }
  const selectionMayBeUsingNativePicker=reason==="visibility hidden"&&!mesh;
  const hadPendingAttempt=!!(activeConnectAttempt&&!activeConnectAttempt.cancelled&&!selectionMayBeUsingNativePicker);
  if(hadPendingAttempt){
    activeConnectAttempt.cancelled=true;
    activeConnectAttempt.cancelReason=reason;
  }
  stopPresetEffect("lifecycle: "+reason,{deferWakeRelease:true});
  const wasConnected=!!(mesh?.sessionKey||mesh?.device?.gatt?.connected);
  connectionReady=false;
  // Releasing GATT is the first native operation. Storage and screen APIs can
  // be slow or ignored while Bluefy is already moving into the background.
  try{ if(mesh) mesh.disconnect("lifecycle: "+reason); }
  catch(e){ diagnosticError("LIFECYCLE","RELEASE_DISCONNECT_FAILED",e,{reason}); }
  releasePresetEffectWakeLock({immediateScreenDim:true});
  diagnosticLog("LIFECYCLE","RELEASE_START",Object.assign({reason},releaseSnapshot));
  if(hadPendingAttempt){
    diagnosticLog("CONNECT","ATTEMPT_CANCEL_REQUESTED",{attemptId:activeConnectAttempt.id,reason},"WARN");
  }else if(activeConnectAttempt&&!activeConnectAttempt.cancelled&&selectionMayBeUsingNativePicker){
    diagnosticLog("CONNECT","SELECTION_CANCEL_DEFERRED",{attemptId:activeConnectAttempt.id,reason:"native picker may have hidden the page"});
  }
  if(wasConnected||hadPendingAttempt){
    setStatus("idle","Disconnected for "+reason);
  }
  updateControlAvailability();
  diagnosticLog("LIFECYCLE","RELEASE_DONE",{reason,wasConnected,hadPendingAttempt,gattConnected:!!mesh?.device?.gatt?.connected,sessionPresent:!!mesh?.sessionKey,gattReleased:!mesh?.device?.gatt?.connected&&!mesh?.sessionKey,pendingAttemptPresent:!!activeConnectAttempt,foregroundResumeWanted});
  scheduleDiagnosticPersistence(true);
}
let lastLampReleaseAt=0;
window.addEventListener("pageshow",event=>{
  lastLampReleaseAt=0;
  diagnosticSessionEnded=false;
  markDiagnosticSessionActive();
  diagnosticLog("LIFECYCLE","PAGESHOW",{persisted:!!event.persisted,visibility:document.visibilityState});
  if(event.persisted&&!document.hidden) scheduleForegroundResume("BFCache pageshow");
});
window.addEventListener("pagehide",event=>{
  if(!event.persisted) cancelForegroundResume("pagehide",{clearDevice:true});
  else diagnosticLog("LIFECYCLE","FOREGROUND_RESUME_PRESERVED",{reason:"BFCache pagehide"});
  releaseLamp(event.persisted?"pagehide persisted":"pagehide");
  diagnosticLog("LIFECYCLE","PAGEHIDE",{persisted:!!event.persisted});
  if(!event.persisted) endDiagnosticSession("pagehide");
});
window.addEventListener("beforeunload",()=>{
  cancelForegroundResume("beforeunload",{clearDevice:true});
  releaseLamp("beforeunload");
  diagnosticLog("LIFECYCLE","BEFOREUNLOAD");
  endDiagnosticSession("beforeunload");
});
document.addEventListener("visibilitychange",()=>{
  if(document.hidden) releaseLamp("visibility hidden");
  diagnosticLog("LIFECYCLE","VISIBILITY_CHANGE",{visibility:document.visibilityState});
  if(!document.hidden) scheduleForegroundResume("visibility visible");
});
try{
  navigator.bluetooth?.addEventListener?.("backgroundstatechanged",event=>{
    const rawValue=event?.value??event?.detail??"unknown";
    const value=(typeof rawValue==="string"||typeof rawValue==="number"||typeof rawValue==="boolean") ? diagnosticSafeText(rawValue,120) : Object.prototype.toString.call(rawValue);
    diagnosticLog("LIFECYCLE","BLUEFY_BACKGROUND_STATE",{value});
  });
}catch(e){ diagnosticError("LIFECYCLE","BLUEFY_BACKGROUND_LISTENER_FAILED",e); }
</script>
